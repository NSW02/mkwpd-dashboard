// ─── Live Sales View ──────────────────────────────────
function parseLiveDate(s) {
  if (!s) return null;
  const m = String(s).match(/(\d+)\/(\d+)\/(\d{4})/);
  if (!m) return null;
  const yr = Number(m[3]);
  return new Date(yr, Number(m[2]) - 1, Number(m[1]));
}

function parseHM(s) {
  if (!s) return null;
  const m = String(s).match(/(\d+):(\d+)(?::(\d+))?/);
  if (!m) return null;
  return { h: Number(m[1]), m: Number(m[2]), s: Number(m[3] || 0) };
}

function calcDurationMin(start, end) {
  const a = parseHM(start), b = parseHM(end);
  if (!a || !b) return 0;
  let s = a.h * 60 + a.m;
  let e = b.h * 60 + b.m;
  if (e < s) e += 24 * 60;
  return e - s;
}

function fmtDurationHM(totalMin) {
  if (!totalMin) return '0 ชม.';
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  if (h === 0) return m + ' นาที';
  if (m === 0) return h + ' ชม.';
  return h + ' ชม. ' + m + ' นาที';
}

function nameMatches(rowName, userName) {
  if (!rowName || !userName) return false;
  const r = String(rowName).toLowerCase().trim();
  const u = String(userName).toLowerCase().trim();
  if (!u) return false;
  if (r === u) return true;
  if (r.includes(u) || u.includes(r)) return true;
  const nick = (r.match(/\(([^)]+)\)/) || [])[1];
  if (nick && u.includes(nick.toLowerCase())) return true;
  const userNick = (u.match(/\(([^)]+)\)/) || [])[1];
  if (userNick && r.includes(userNick.toLowerCase())) return true;
  const rTok = r.split(/[\s\(]/)[0];
  const uTok = u.split(/[\s\(]/)[0];
  if (rTok && uTok && (rTok === uTok)) return true;
  return false;
}

function LiveSalesView({ currentUser }) {
  const [rows, setRows] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const [error, setError] = React.useState(null);
  const [lastUpdated, setLastUpdated] = React.useState(null);
  const isAdmin = hasPerm(currentUser, 'admin');
  const isOwner = !!(currentUser && currentUser.permissions && currentUser.permissions.owner);
  const canSeeAll = isAdmin || isOwner;

  const [preset, setPreset] = React.useState('month');
  const [dateFrom, setDateFrom] = React.useState(() => {
    const d = new Date(); return ymd(new Date(d.getFullYear(), d.getMonth(), 1));
  });
  const [dateTo, setDateTo] = React.useState(() => {
    const d = new Date(); return ymd(new Date(d.getFullYear(), d.getMonth() + 1, 0));
  });
  const [personFilter, setPersonFilter] = React.useState('all');

  const applyPreset = React.useCallback((p) => {
    const now = new Date();
    setPreset(p);
    if (p === 'today') {
      const s = ymd(now); setDateFrom(s); setDateTo(s);
    } else if (p === 'week') {
      const start = new Date(now); start.setDate(start.getDate() - 6);
      setDateFrom(ymd(start)); setDateTo(ymd(now));
    } else if (p === 'month') {
      setDateFrom(ymd(new Date(now.getFullYear(), now.getMonth(), 1)));
      setDateTo(ymd(new Date(now.getFullYear(), now.getMonth() + 1, 0)));
    } else if (p === 'lastMonth') {
      const start = new Date(now.getFullYear(), now.getMonth() - 1, 1);
      const end = new Date(now.getFullYear(), now.getMonth(), 0);
      setDateFrom(ymd(start)); setDateTo(ymd(end));
    } else if (p === 'thisYear') {
      setDateFrom(ymd(new Date(now.getFullYear(), 0, 1)));
      setDateTo(ymd(new Date(now.getFullYear(), 11, 31)));
    }
  }, []);

  const [sheetTabs, setSheetTabs] = React.useState([]);

  const loadLive = React.useCallback(async () => {
    setLoading(true);
    setError(null);
    try {
      const tabs = await discoverLiveSheets();
      setSheetTabs(tabs);
      const results = await Promise.all(tabs.map(async (t) => {
        try {
          const res = await fetch(LIVE_SHEET_CSV(t.gid) + '&_t=' + Date.now());
          if (!res.ok) return { tab: t, rows: [], error: 'HTTP ' + res.status };
          const text = await res.text();
          const raw = parseCSV(text);
          if (raw.length < 2) return { tab: t, rows: [] };
          const rs = [];
          for (let i = 1; i < raw.length; i++) {
            const r = raw[i];
            if (!r[0] || !r[0].trim()) continue;
            const date = parseLiveDate(r[0]);
            if (!date) continue;
            if (num(r[10]) <= 0) continue;
            const start = (r[3] || '').trim();
            const end = (r[4] || '').trim();
            const durationMin = calcDurationMin(start, end);
            rs.push({
              date,
              dateStr: r[0].trim(),
              name: (r[1] || '').trim(),
              channel: (r[2] || '').trim(),
              start, end,
              durationMin,
              upAmt: num(r[5]),
              downAmt: num(r[6]),
              totalSales: num(r[7]),
              commPct: (r[9] || '').trim(),
              commission: num(r[10]),
              sheet: t.name
            });
          }
          return { tab: t, rows: rs };
        } catch (e) {
          return { tab: t, rows: [], error: e.message };
        }
      }));
      const out = [];
      const seen = new Set();
      results.forEach(r => {
        r.rows.forEach(row => {
          const key = row.sheet + '|' + row.dateStr + '|' + row.name + '|' + row.channel + '|' + row.start + '|' + row.end + '|' + row.totalSales + '|' + row.commission;
          if (seen.has(key)) return;
          seen.add(key);
          out.push(row);
        });
      });
      out.sort((a, b) => b.date - a.date);
      const failed = results.filter(r => r.error);
      if (failed.length && failed.length === results.length) {
        throw new Error('โหลดทุกชีตไม่สำเร็จ: ' + failed[0].error);
      }
      setRows(out);
      setLastUpdated(new Date());
      if (failed.length) {
        setError('โหลดไม่ครบ ' + failed.length + '/' + results.length + ' ชีต — ' + failed.map(f => f.tab.name).join(', '));
      }
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  }, []);

  React.useEffect(() => {
    loadLive();
    const id = setInterval(loadLive, 60000);
    return () => clearInterval(id);
  }, [loadLive]);

  const userScopedRows = React.useMemo(() => {
    if (!rows) return [];
    if (canSeeAll) return rows;
    const me = currentUser ? currentUser.name : '';
    return rows.filter(r => nameMatches(r.name, me));
  }, [rows, canSeeAll, currentUser]);

  const allNames = React.useMemo(() => {
    const set = new Set();
    userScopedRows.forEach(r => { if (r.name) set.add(r.name); });
    return Array.from(set).sort();
  }, [userScopedRows]);

  const filteredRows = React.useMemo(() => {
    const from = dateFrom ? new Date(dateFrom + 'T00:00:00') : null;
    const to = dateTo ? new Date(dateTo + 'T23:59:59') : null;
    return userScopedRows.filter(r => {
      if (from && r.date < from) return false;
      if (to && r.date > to) return false;
      if (personFilter !== 'all' && r.name !== personFilter) return false;
      return true;
    });
  }, [userScopedRows, dateFrom, dateTo, personFilter]);

  const totals = React.useMemo(() => {
    let sales = 0, dur = 0, comm = 0;
    filteredRows.forEach(r => { sales += r.totalSales; dur += r.durationMin; comm += r.commission; });
    return { sales, dur, comm, count: filteredRows.length };
  }, [filteredRows]);

  const perPerson = React.useMemo(() => {
    const map = new Map();
    filteredRows.forEach(r => {
      if (!map.has(r.name)) map.set(r.name, { name: r.name, sales: 0, dur: 0, durTiktok: 0, durShopee: 0, comm: 0, count: 0 });
      const o = map.get(r.name);
      o.sales += r.totalSales; o.dur += r.durationMin; o.comm += r.commission; o.count++;
      const ch = (r.channel || '').toLowerCase();
      if (ch.includes('tiktok')) o.durTiktok += r.durationMin;
      else if (ch.includes('shopee')) o.durShopee += r.durationMin;

  const rangeLabel = React.useMemo(() => {

    return fmt(dateFrom) + ' – ' + fmt(dateTo);

  const fmtBaht = (v) => '฿' + Math.round(v).toLocaleString('en-US');

  const fmtChan = (c) => {

    return { color: '#475569', bg: '#f1f5f9', emoji: '📺', label: c };
  };

  return (
    <div style={{ padding: '24px', background: 'linear-gradient(135deg, #fff7ed 0%, #fde68a 100%)', minHeight: '100%' }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexWrap: 'wrap', gap: 12, marginBottom: 20 }}>
        <div>
          <div style={{ color: 'var(--muted)', fontSize: 12, marginBottom: 4 }}>
            ยอดขาย(ไลฟ์) · <span style={{ color: loading ? '#d97706' : 'var(--muted)' }}>
              {loading ? '● กำลังโหลด…' : (lastUpdated ? '● อัปเดตล่าสุด ' + lastUpdated.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }) + ' น.' : '')}
            </span>
            {!canSeeAll && (<span style={{ marginLeft: 8, padding: '2px 8px', borderRadius: 6, background: '#fef3c7', color: '#92400e', fontSize: 11 }}>👁 เห็นเฉพาะของคุณ</span>)}
          </div>

function fileToDataURL(file) {
  return new Promise((resolve, reject) => {
    if (!file) return resolve(null);
    const r = new FileReader();
    r.onload = () => resolve(r.result); r.onerror = reject; r.readAsDataURL(file);
  });
}
// บีบอัด/ย่อรูปก่อนอัปโหลด (กัน payload ใหญ่ -> Failed to fetch)
function compressImage(file, maxDim, quality) {
  return new Promise((resolve, reject) => {
    if (!file) return resolve(null);
    if (!/^image\//.test(file.type || '')) return fileToDataURL(file).then(resolve, reject);
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      URL.revokeObjectURL(url);
      let w = img.naturalWidth, h = img.naturalHeight;
      const md = maxDim || 1280;
      if (w > md || h > md) { const s = Math.min(md / w, md / h); w = Math.round(w * s); h = Math.round(h * s); }
      try {
        const c = document.createElement('canvas'); c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(c.toDataURL('image/jpeg', quality || 0.72));
      } catch (e) { fileToDataURL(file).then(resolve, reject); }
    };
    img.onerror = () => { URL.revokeObjectURL(url); fileToDataURL(file).then(resolve, reject); };
    img.src = url;
  });
}
function pRowDate(s) { s = String(s || '').trim(); var t = s.match(/^(\d{1,2})-(\d{1,2})-(\d{4})/); if (t) return { d: +t[1], mo: +t[2], y: +t[3] }; var dt = new Date(s); return isNaN(dt.getTime()) ? null : { d: dt.getDate(), mo: dt.getMonth() + 1, y: dt.getFullYear() }; }
async function claimsApi(payload) {
  const res = await fetch(CLAIMS_API, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(payload) });
  return res.json();
}

const fLbl = { fontSize: 12, color: 'var(--muted)', marginBottom: 4, display: 'block' };
function statusPillColor(s) {
  if (s === 'ส่งสลิปให้ลูกค้าแล้ว' || s === 'ทำเรื่องโอนแล้ว') return 'var(--leaf)';
  if (s === 'ทำเรื่องขออนุมัติแล้ว') return '#eab308';

  if (s === 'อนุมัติแล้ว') return 'var(--tamarind)';
  if (s === 'รออนุมัติ' || !s) return 'var(--rust)';
  return 'var(--muted)';
}
function fmtClaimDate(s) {
  if (!s) return '–';
  if (/^\d{1,2}-\d{1,2}-\d{4}/.test(s)) return String(s).split(' ')[0];
  const d = new Date(s);
  if (!isNaN(d.getTime())) return d.getDate() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + d.getFullYear();
  return s;
}

// ─── ฟอร์มบันทึกการเคลม (ตัดสลิป + เพิ่มเหตุผล) ───
function ClaimForm({ currentUser, onSaved }) {
  const today = new Date().toISOString().slice(0, 10);
  const [open, setOpen] = React.useState(true);
  const [form, setForm] = React.useState({ date: today, person: currentUser || '', source: 'Tiktok', ref: '', customer: '', account: '', orderAmount: '', claimAmount: '', reason: '', status: 'รออนุมัติ' });
  const [prodFile, setProdFile] = React.useState(null);
  const [fileKey, setFileKey] = React.useState(0);
  const [busy, setBusy] = React.useState(false);
  const [msg, setMsg] = React.useState(null);
  React.useEffect(() => { setForm((f) => ({ ...f, person: f.person || currentUser || '' })); }, [currentUser]);
  const upd = (k) => (e) => setForm((f) => ({ ...f, [k]: e.target.value }));
  const field = (label, node, req = true) => (<div><label style={fLbl}>{label}{req && <span style={{ color: 'var(--neg)' }}> *</span>}</label>{node}</div>);
  var REQ = ['date', 'person', 'source', 'customer', 'account', 'ref', 'orderAmount', 'claimAmount', 'reason'];
  var isComplete = REQ.every(function (k) { return String(form[k] || '').trim() !== ''; }) && !!prodFile;

  async function submit(e) {
    e.preventDefault();
    if (!CLAIMS_API) { setMsg({ t: 'err', m: 'ยังไม่ได้ตั้งค่า CLAIMS_API' }); return; }
    if (!isComplete) { setMsg({ t: 'err', m: 'กรุณากรอกข้อมูลให้ครบทุกช่อง และแนบรูปสินค้า ก่อนบันทึก' }); return; }
    setBusy(true); setMsg(null);
    try {
      const p = await compressImage(prodFile);
      const d = await claimsApi({ action: 'create', ...form, imageProduct: p, imageProductType: 'image/jpeg' });
      if (!d.ok) throw new Error(d.error || 'บันทึกไม่สำเร็จ');
      setMsg({ t: 'ok', m: 'บันทึกเรียบร้อย! เพิ่มลงแท็บ "' + d.sheet + '" และเซฟรูปลง Drive แล้ว' });
      if (onSaved) onSaved({ ...form, key: d.key, imageProductUrl: d.imageProductUrl, _t: new Date().toLocaleString('th-TH') });
      setForm((f) => ({ ...f, ref: '', customer: '', account: '', orderAmount: '', claimAmount: '', reason: '' }));
      setProdFile(null); setFileKey((k) => k + 1);
    } catch (err) {
      setMsg({ t: 'err', m: 'ผิดพลาด: ' + err.message });
    } finally { setBusy(false); }
  }
  return (
    <div className="card" style={{ marginBottom: 16 }}>
      <div className="card-h" style={{ marginBottom: open ? 16 : 0 }}>
        <div><h3>บันทึกการเคลม (Booking)</h3><div className="sub">กรอกข้อมูล + แนบรูปสินค้า + เหตุผล → บันทึกลงชีตและ Drive</div></div>
        <button className="btn" style={{ padding: '6px 12px', fontSize: 13 }} onClick={() => setOpen((o) => !o)}>{open ? 'ย่อ' : 'เปิดฟอร์ม'}</button>
      </div>
      {open && (
        <form onSubmit={submit}>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(170px, 1fr))', gap: 12 }}>
            {field('วันที่', <input type="date" style={fInp} value={form.date} onChange={upd('date')} />, true)}
            {field('ผู้ทำรายการ', <input style={fInp} value={form.person} onChange={upd('person')} placeholder="เช่น ฟาง" />, true)}
            {field('แหล่งที่มา', <select style={fInp} value={form.source} onChange={upd('source')}>{CLAIM_SOURCES.map((s) => <option key={s} value={s}>{s}</option>)}</select>)}
            {field('ชื่อลูกค้า', <input style={fInp} value={form.customer} onChange={upd('customer')} placeholder="ชื่อ-สกุล" />, true)}
            {field('เลขบัญชี', <input style={fInp} value={form.account} onChange={upd('account')} placeholder="ธนาคาร / พร้อมเพย์" />)}
            {field('เลขอ้างอิง', <input style={fInp} value={form.ref} onChange={upd('ref')} placeholder="เลขอ้างอิง" />)}
            {field('ยอดสั่งซื้อ (บาท)', <input type="number" step="0.01" style={fInp} value={form.orderAmount} onChange={upd('orderAmount')} placeholder="0" />)}
            {field('ยอดเคลม (บาท)', <input type="number" step="0.01" style={fInp} value={form.claimAmount} onChange={upd('claimAmount')} placeholder="0" />)}
            {field('แนบรูปสินค้า', <input key={'p' + fileKey} type="file" accept="image/*" style={{ ...fInp, padding: '6px' }} onChange={(e) => setProdFile(e.target.files[0] || null)} />)}
          </div>
          <div style={{ marginTop: 12 }}>{field('เหตุผลในการเคลม', <textarea style={{ ...fInp, minHeight: 60, resize: 'vertical' }} value={form.reason} onChange={upd('reason')} placeholder="อธิบายเหตุผล เช่น สินค้าชำรุด / ส่งผิดรุ่น / ขนส่งทำเสียหาย" />)}</div>
          {msg && (<div style={{ marginTop: 14, padding: '10px 12px', borderRadius: 8, fontSize: 13, background: msg.t === 'ok' ? 'color-mix(in oklab, var(--leaf) 14%, transparent)' : 'color-mix(in oklab, var(--neg) 14%, transparent)', color: msg.t === 'ok' ? 'var(--leaf)' : 'var(--neg)' }}>{msg.m}</div>)}
          <div style={{ marginTop: 16, display: 'flex', gap: 10, alignItems: 'center' }}>
            <button type="submit" className="btn" disabled={busy || !isComplete} style={{ padding: '9px 18px', fontSize: 14, fontWeight: 600, background: 'var(--tamarind)', color: '#fff', borderColor: 'var(--tamarind)', opacity: (busy || !isComplete) ? 0.5 : 1, cursor: busy ? 'wait' : (!isComplete ? 'not-allowed' : 'pointer') }}>{busy ? 'กำลังบันทึก…' : 'บันทึกการเคลม'}</button>
            <span style={{ fontSize: 11.5, color: isComplete ? 'var(--muted)' : 'var(--neg)' }}>{isComplete ? '* ทุกช่องครบแล้ว พร้อมบันทึก' : '* ต้องกรอกครบทุกช่อง + แนบรูปสินค้า จึงจะกดบันทึกได้'}</span>
          </div>
        </form>
      )}
    </div>
  );

// ─── การ์ดรายการเคลม 1 รายการ (+ ปุ่มเปลี่ยนสถานะ 2 ปุ่ม) ───
function ClaimCard({ it, onUpdated, reload, compact }) {
  const [file, setFile] = React.useState(null);
  const [fileKey, setFileKey] = React.useState(0);
  const [busy, setBusy] = React.useState(false);
  const [err, setErr] = React.useState(null);
  async function setStatus(newStatus) {
    if (!CLAIMS_API) { setErr('ยังไม่ได้ตั้งค่า CLAIMS_API'); return; }
    setBusy(true); setErr(null);
    let statusOk = false;
    // จังหวะ 1: เปลี่ยนสถานะอย่างเดียว (เล็ก/เร็ว/เชื่อถือได้)
    try {
      const d1 = await claimsApi({ action: 'approve', key: it.key, status: newStatus });
      if (d1 && d1.ok) statusOk = true;
    } catch (e1) { /* อาจสำเร็จที่ server แต่อ่าน response ไม่ได้ — จะ reconcile ภายหลัง */ }
    onUpdated(it.key, { status: newStatus });
    // จังหวะ 2: อัปรูป (ถ้ามี) แบบ best-effort
    if (file) {
      try {
        const img = await compressImage(file);
        const d2 = await claimsApi({ action: 'approve', key: it.key, status: newStatus, pendingImage: img, pendingImageType: 'image/jpeg' });
        if (d2 && d2.ok && d2.pendingUrl) onUpdated(it.key, { pendingUrl: d2.pendingUrl });
      } catch (e2) { /* รูปอาจอัปสำเร็จที่ server — reconcile ด้วยการ reload */ }
      setFile(null); setFileKey((k) => k + 1);
    }
    setBusy(false);
    // ดึงข้อมูลจริงจากชีตมายืนยันผลเสมอ
    if (reload) setTimeout(() => reload(), file ? 1500 : 400);
  }

    var active = it.status === status;
    return (
      <button className="btn" disabled={busy} onClick={() => setStatus(status)} style={{
        padding: active ? (compact ? '5px 11px' : '8px 16px') : (compact ? '4px 10px' : '7px 13px'), fontSize: compact ? 12 : 13, fontWeight: active ? 700 : 500,
        background: active ? color : 'transparent', color: active ? '#fff' : color,
        border: '1.5px solid ' + color, borderRadius: 8,
        boxShadow: active ? '0 2px 8px -1px color-mix(in oklab, ' + color + ' 55%, transparent), 0 0 0 3px color-mix(in oklab, ' + color + ' 22%, transparent)' : 'none',
        opacity: busy ? 0.6 : 1, cursor: busy ? 'wait' : 'pointer', transition: 'all 120ms'
      }}>
        {active ? '✓ ' + label : label}
      </button>
    );
  };
  if (compact) {
    const meta = (lb, v) => (<div><span style={{ color: 'var(--muted)' }}>{lb}:</span> {v}</div>);
    return (
      <div style={{ border: '1px solid var(--border)', borderRadius: 10, padding: '12px 14px', background: 'var(--surface)', display: 'flex', gap: 16, flexWrap: 'wrap', alignItems: 'flex-start' }}>
        <div style={{ flex: 1, minWidth: 280 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', gap: 10, flexWrap: 'wrap', alignItems: 'center' }}>
            <div style={{ fontWeight: 600, fontSize: 14 }}>{it.customer || '(ไม่ระบุชื่อ)'} <span style={{ color: 'var(--muted)', fontWeight: 400, fontSize: 12 }}>· {fmtClaimDate(it.date)}</span></div>
            <span className="pill" style={{ background: 'color-mix(in oklab, ' + statusPillColor(it.status) + ' 16%, transparent)', color: statusPillColor(it.status) }}>{it.status || 'รออนุมัติ'}</span>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(130px, 1fr))', gap: '4px 16px', marginTop: 8, fontSize: 12.5 }}>
            {meta('ผู้ทำรายการ', it.person || '–')}
            {meta('แหล่งที่มา', it.source || '–')}
            {meta('เลขบัญชี', it.account || '–')}
            {meta('ยอดสั่งซื้อ', '฿' + (it.order || 0))}
            {meta('ยอดเคลม', '฿' + (it.claim || 0))}
            {meta('อ้างอิง', it.ref || '–')}
          </div>
          {it.reason && <div style={{ marginTop: 6, fontSize: 12.5 }}><span style={{ color: 'var(--muted)' }}>เหตุผล:</span> {it.reason}</div>}
          <div style={{ marginTop: 8, display: 'flex', gap: 14, flexWrap: 'wrap', fontSize: 13 }}>
            {it.productUrl ? <a href={it.productUrl} target="_blank" rel="noreferrer" style={{ color: 'var(--tamarind)' }}>🖼️ รูปสินค้า</a> : <span style={{ color: 'var(--faint)' }}>ไม่มีรูปสินค้า</span>}
            {it.pendingUrl ? <a href={it.pendingUrl} target="_blank" rel="noreferrer" style={{ color: 'var(--honey)' }}>📋 รูปสลิป/รออนุมัติ</a> : <span style={{ color: 'var(--faint)' }}>ยังไม่มีรูปสลิป/รออนุมัติ</span>}
          </div>
        </div>
        <div style={{ minWidth: 230, display: 'flex', flexDirection: 'column', gap: 8 }}>
          <div style={{ fontSize: 11.5, color: 'var(--muted)' }}>เปลี่ยนสถานะ (แนบรูปได้ — ไม่บังคับ)</div>
          <input key={'a' + fileKey} type="file" accept="image/*" style={{ ...fInp, padding: '5px' }} onChange={(e) => setFile(e.target.files[0] || null)} />
          <div style={{ display: 'flex', gap: 6, alignItems: 'center', flexWrap: 'wrap' }}>
            {btn('ทำเรื่องขออนุมัติแล้ว', 'ทำเรื่องขออนุมัติแล้ว', '#eab308')}
            {btn('อนุมัติแล้ว', 'อนุมัติแล้ว', 'var(--tamarind)')}
            {btn('ส่งสลิปให้ลูกค้าแล้ว', 'ส่งสลิปให้ลูกค้าแล้ว', 'var(--leaf)')}
          </div>
          {busy && <span style={{ fontSize: 11.5, color: 'var(--muted)' }}>กำลังบันทึก…</span>}
          {err && <span style={{ color: 'var(--neg)', fontSize: 11.5 }}>{err}</span>}
        </div>
      </div>
    );
  }
  return (
    <div style={{ border: '1px solid var(--border)', borderRadius: 12, padding: 14, background: 'var(--surface)' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', gap: 10, flexWrap: 'wrap' }}>
        <div style={{ fontWeight: 600 }}>{it.customer || '(ไม่ระบุชื่อ)'} <span style={{ color: 'var(--muted)', fontWeight: 400, fontSize: 12 }}>· {fmtClaimDate(it.date)}</span></div>
        <span className="pill" style={{ background: 'color-mix(in oklab, ' + statusPillColor(it.status) + ' 16%, transparent)', color: statusPillColor(it.status) }}>{it.status || 'รออนุมัติ'}</span>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(120px, 1fr))', gap: '6px 14px', marginTop: 10, fontSize: 12.5 }}>
        <div><span style={{ color: 'var(--muted)' }}>ผู้ทำรายการ:</span> {it.person || '–'}</div>
        <div><span style={{ color: 'var(--muted)' }}>แหล่งที่มา:</span> {it.source || '–'}</div>
        <div><span style={{ color: 'var(--muted)' }}>เลขบัญชี:</span> {it.account || '–'}</div>
        <div><span style={{ color: 'var(--muted)' }}>ยอดสั่งซื้อ:</span> ฿{it.order || 0}</div>
        <div><span style={{ color: 'var(--muted)' }}>ยอดเคลม:</span> ฿{it.claim || 0}</div>
        <div><span style={{ color: 'var(--muted)' }}>อ้างอิง:</span> {it.ref || '–'}</div>
      </div>
      {it.reason && <div style={{ marginTop: 8, fontSize: 12.5 }}><span style={{ color: 'var(--muted)' }}>เหตุผล:</span> {it.reason}</div>}
      <div style={{ marginTop: 10, display: 'flex', gap: 14, flexWrap: 'wrap', fontSize: 13 }}>
        {it.productUrl ? <a href={it.productUrl} target="_blank" rel="noreferrer" style={{ color: 'var(--tamarind)' }}>🖼️ รูปสินค้า</a> : <span style={{ color: 'var(--faint)' }}>ไม่มีรูปสินค้า</span>}
        {it.pendingUrl ? <a href={it.pendingUrl} target="_blank" rel="noreferrer" style={{ color: 'var(--honey)' }}>📋 รูปสลิป/รออนุมัติ</a> : <span style={{ color: 'var(--faint)' }}>ยังไม่มีรูปสลิป/รออนุมัติ</span>}
      </div>
      <div style={{ marginTop: 12, paddingTop: 12, borderTop: '1px dashed var(--border)' }}>
        <div style={{ fontSize: 11.5, color: 'var(--muted)', marginBottom: 6 }}>เปลี่ยนสถานะ (แนบรูปสลิป/รออนุมัติได้ — ไม่บังคับ)</div>
        <input key={'a' + fileKey} type="file" accept="image/*" style={{ ...fInp, padding: '5px', marginBottom: 8 }} onChange={(e) => setFile(e.target.files[0] || null)} />

          {btn('ทำเรื่องขออนุมัติแล้ว', 'ทำเรื่องขออนุมัติแล้ว', '#eab308')}
          {btn('อนุมัติแล้ว', 'อนุมัติแล้ว', 'var(--tamarind)')}
          {btn('ส่งสลิปให้ลูกค้าแล้ว', 'ส่งสลิปให้ลูกค้าแล้ว', 'var(--leaf)')}
          {busy && <span style={{ fontSize: 12, color: 'var(--muted)' }}>กำลังบันทึก…</span>}
          {err && <span style={{ color: 'var(--neg)', fontSize: 12 }}>{err}</span>}
        </div>
      </div>
    </div>
  );
}

// ─── แท็บ รายการ & อนุมัติ ───
function ClaimsList({ currentUser }) {
  const [items, setItems] = React.useState([]);
  const [loading, setLoading] = React.useState(false);
  const [err, setErr] = React.useState(null);
  const [scope, setScope] = React.useState('all');
  const [month, setMonth] = React.useState(new Date().getMonth() + 1);
  const [q, setQ] = React.useState('');
  const [viewMode, setViewMode] = React.useState('month');
  const [selDate, setSelDate] = React.useState(new Date().toISOString().slice(0, 10));
  const [selYear, setSelYear] = React.useState(new Date().getFullYear());
  const [viewStyle, setViewStyle] = React.useState(function () { try { return localStorage.getItem('mkw_claim_viewstyle') || 'card'; } catch (e) { return 'card'; } });
  const setVS = function (v) { setViewStyle(v); try { localStorage.setItem('mkw_claim_viewstyle', v); } catch (e) {} };
  async function load() {
    if (!CLAIMS_API) { setErr('ยังไม่ได้ตั้งค่า CLAIMS_API'); return; }
    setLoading(true); setErr(null);
    try { const d = await claimsApi(viewMode === 'year' ? { action: 'list' } : { action: 'list', month }); if (!d.ok) throw new Error(d.error || 'โหลดไม่สำเร็จ'); setItems(d.items || []); }
    catch (e) { setErr(e.message); } finally { setLoading(false); }
  }
  React.useEffect(() => { load(); }, [month, viewMode]);
  React.useEffect(function () { if (viewMode === 'day') { var mm = parseInt(selDate.split('-')[1], 10); if (mm && mm !== month) setMonth(mm); } }, [viewMode, selDate]);
  function onUpdated(key, patch) { setItems((arr) => arr.map((x) => x.key === key ? { ...x, ...patch } : x)); }
  const mine = (currentUser || '').trim();
  const qq = q.trim().toLowerCase();
  const yearOpts = React.useMemo(function () {
    var set = {};
    items.forEach(function (it) { var pd = pRowDate(it.date); if (pd && pd.y) set[pd.y] = 1; });
    var cy = new Date().getFullYear(); set[cy] = 1; set[cy + 1] = 1;
    return Object.keys(set).map(Number).sort(function (a, b) { return b - a; });
  }, [items]);
  const filtered = items.filter(function (it) {
    if (scope !== 'all' && (it.person || '').trim() !== mine) return false;
    if (viewMode === 'day') { var pd = pRowDate(it.date); var dp = selDate.split('-'); if (!pd || pd.y !== +dp[0] || pd.mo !== +dp[1] || pd.d !== +dp[2]) return false; }
    if (viewMode === 'year') { var py = pRowDate(it.date); if (!py || py.y !== selYear) return false; }
    if (qq) { var hay = ((it.customer || '') + ' ' + (it.ref || '') + ' ' + (it.person || '') + ' ' + (it.account || '')).toLowerCase(); if (hay.indexOf(qq) < 0) return false; }
    return true;
  }).slice().reverse();
  const segBtn = (val, label) => (
    <button className="btn" onClick={() => setScope(val)} style={{ padding: '6px 14px', fontSize: 13, fontWeight: scope === val ? 600 : 400, background: scope === val ? 'var(--tamarind)' : 'var(--surface)', color: scope === val ? '#fff' : 'var(--ink)', borderColor: scope === val ? 'var(--tamarind)' : 'var(--border)' }}>{label}</button>
  );
  return (
    <div className="card">
      <div className="card-h">
        <div><h3>รายการเคลม & ขออนุมัติ</h3><div className="sub">ดูข้อมูล/รูป · เปลี่ยนสถานะได้ 2 แบบ</div></div>
        <button className="btn" onClick={load} disabled={loading} style={{ padding: '6px 12px', fontSize: 13 }}>{loading ? 'กำลังโหลด…' : '↻ รีเฟรช'}</button>
      </div>
      <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap', alignItems: 'center', marginBottom: 14 }}>
        {segBtn('mine', 'รายการที่ฉันสร้าง')}
        {segBtn('all', 'รายการทั้งหมด')}
        <span style={{ marginLeft: 6, display: 'inline-flex', border: '1px solid var(--border)', borderRadius: 8, overflow: 'hidden' }}>
          <button className="btn" onClick={() => setViewMode('month')} style={{ padding: '6px 12px', fontSize: 12.5, border: 'none', borderRadius: 0, fontWeight: viewMode === 'month' ? 600 : 400, background: viewMode === 'month' ? 'var(--tamarind)' : 'var(--surface)', color: viewMode === 'month' ? '#fff' : 'var(--ink)' }}>ทั้งเดือน</button>
          <button className="btn" onClick={() => setViewMode('day')} style={{ padding: '6px 12px', fontSize: 12.5, border: 'none', borderRadius: 0, fontWeight: viewMode === 'day' ? 600 : 400, background: viewMode === 'day' ? 'var(--tamarind)' : 'var(--surface)', color: viewMode === 'day' ? '#fff' : 'var(--ink)' }}>รายวัน</button>
          <button className="btn" onClick={() => setViewMode('year')} style={{ padding: '6px 12px', fontSize: 12.5, border: 'none', borderRadius: 0, fontWeight: viewMode === 'year' ? 600 : 400, background: viewMode === 'year' ? 'var(--tamarind)' : 'var(--surface)', color: viewMode === 'year' ? '#fff' : 'var(--ink)' }}>ทั้งปี</button>
        </span>
        {viewMode === 'month'
          ? (<select style={{ ...fInp, width: 'auto' }} value={month} onChange={(e) => setMonth(parseInt(e.target.value, 10))}>{TH_MONTHS.map((nm, i) => i === 0 ? null : <option key={i} value={i}>{nm}</option>)}</select>)
          : viewMode === 'day'
          ? (<input type="date" style={{ ...fInp, width: 'auto' }} value={selDate} onChange={(e) => setSelDate(e.target.value)} />)
          : (<select style={{ ...fInp, width: 'auto' }} value={selYear} onChange={(e) => setSelYear(parseInt(e.target.value, 10))}>{yearOpts.map((y) => <option key={y} value={y}>ปี {y}</option>)}</select>)}
        <input style={{ ...fInp, width: 230 }} value={q} onChange={(e) => setQ(e.target.value)} placeholder="🔍 ค้นหา ชื่อลูกค้า / เลขอ้างอิง" />
        <span style={{ marginLeft: 'auto', display: 'inline-flex', border: '1px solid var(--border)', borderRadius: 8, overflow: 'hidden' }}>
          <button className="btn" onClick={() => setVS('card')} title="แบบกล่อง" style={{ padding: '6px 11px', fontSize: 13, border: 'none', borderRadius: 0, background: viewStyle === 'card' ? 'var(--tamarind)' : 'var(--surface)', color: viewStyle === 'card' ? '#fff' : 'var(--ink)' }}>▦ กล่อง</button>
          <button className="btn" onClick={() => setVS('row')} title="แบบแถว" style={{ padding: '6px 11px', fontSize: 13, border: 'none', borderRadius: 0, background: viewStyle === 'row' ? 'var(--tamarind)' : 'var(--surface)', color: viewStyle === 'row' ? '#fff' : 'var(--ink)' }}>▤ แถว</button>
        </span>
        <span style={{ fontSize: 12, color: 'var(--muted)' }}>แสดง {filtered.length} รายการ{scope === 'mine' && !mine ? ' (ยังไม่ได้ตั้งชื่อผู้ใช้)' : ''}</span>
      </div>
      {err && <div style={{ padding: '10px 12px', borderRadius: 8, fontSize: 13, background: 'color-mix(in oklab, var(--neg) 14%, transparent)', color: 'var(--neg)', marginBottom: 12 }}>{err}</div>}
      {loading ? <div style={{ color: 'var(--muted)', padding: 20, textAlign: 'center' }}>กำลังโหลดรายการ…</div>
        : filtered.length === 0 ? <div style={{ color: 'var(--muted)', padding: 20, textAlign: 'center' }}>ไม่มีรายการ</div>
          : viewStyle === 'row'
            ? <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>{filtered.map((it) => <ClaimCard key={it.key} it={it} onUpdated={onUpdated} reload={load} compact={true} />)}</div>
            : <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(300px, 1fr))', gap: 12 }}>{filtered.map((it) => <ClaimCard key={it.key} it={it} onUpdated={onUpdated} reload={load} />)}</div>}
    </div>
  );
}

// ─── แท็บ ภาพรวม (สถิติ — ดึงสดจากชีต + เลือกช่วงเวลา) ───
function ClaimsOverview() {
  const [items, setItems] = React.useState(null);
  const [loading, setLoading] = React.useState(false);
  const [err, setErr] = React.useState(null);
  const [synced, setSynced] = React.useState(null);
  const [period, setPeriod] = React.useState('year');
  const [selMonth, setSelMonth] = React.useState(new Date().getMonth() + 1);
  const [selDate, setSelDate] = React.useState(new Date().toISOString().slice(0, 10));
  async function load() {
    if (!CLAIMS_API) { setErr('ยังไม่ได้ตั้งค่า CLAIMS_API'); return; }
    setLoading(true); setErr(null);
    try {
      const d = await claimsApi({ action: 'list' });
      if (!d.ok) throw new Error(d.error || 'โหลดไม่สำเร็จ');
      setItems(d.items || []); setSynced(new Date());
    } catch (e) { setErr(e.message); } finally { setLoading(false); }
  }
  React.useEffect(() => { load(); }, []);

  const A = React.useMemo(() => {
    if (!items) return null;
    const num = (x) => { const n = Number(String(x == null ? '' : x).replace(/,/g, '').trim()); return isNaN(n) ? 0 : n; };
    const clean = (n) => { n = String(n || '').trim(); let o = ''; for (const ch of n) { if (o && o[o.length - 1] === ch && ch >= '฀' && ch <= '๿') continue; o += ch; } return o; };
    const pdate = (s) => { s = String(s || '').trim(); const t = s.match(/^(\d{1,2})-(\d{1,2})-(\d{4})/); if (t) return { d: +t[1], mo: +t[2], y: +t[3] }; const dt = new Date(s); return isNaN(dt.getTime()) ? null : { d: dt.getDate(), mo: dt.getMonth() + 1, y: dt.getFullYear() }; };
    const SRC = ['Tiktok', 'Facebook', 'Shopee'];
    const TH = ['', 'ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];

    var filtered = items.filter(function (it) {
      if (period === 'year') return true;
      var pd = pdate(it.date); if (!pd) return false;
      if (period === 'month') return pd.mo === selMonth;
      var parts = selDate.split('-'); return pd.y === +parts[0] && pd.mo === +parts[1] && pd.d === +parts[2];
    });

    let tClaim = 0, tOrder = 0; const srcMap = {}, stMap = {}, pplMap = {}, trendMap = {};
    filtered.forEach(function (it) {
      const cl = num(it.claim), od = num(it.order); tClaim += cl; tOrder += od;
      const sk = it.source || 'อื่นๆ'; if (!srcMap[sk]) srcMap[sk] = { count: 0, claim: 0 }; srcMap[sk].count++; srcMap[sk].claim += cl;
      const st = it.status || '(ว่าง)'; stMap[st] = (stMap[st] || 0) + 1;
      const p = clean(it.person) || '(ไม่ระบุ)'; if (!pplMap[p]) pplMap[p] = { count: 0, claim: 0 }; pplMap[p].count++; pplMap[p].claim += cl;
      // trend key
      if (period !== 'day') {
        var pd = pdate(it.date);
        var key = period === 'year' ? (it.month || (pd ? pd.mo : 0)) : (pd ? pd.d : 0);
        var lab = period === 'year' ? (TH[key] || key) : String(key);
        if (!trendMap[key]) trendMap[key] = { k: key, label: lab, claim: 0, count: 0 };
        trendMap[key].claim += cl; trendMap[key].count++;
      }
    });
    const trend = Object.keys(trendMap).map((k) => trendMap[k]).sort((a, b) => a.k - b.k);
    const source = SRC.filter((s) => srcMap[s]).map((s) => ({ name: s, short: s.slice(0, 2).toUpperCase(), count: srcMap[s].count, claim: srcMap[s].claim, color: s === 'Tiktok' ? '#111827' : s === 'Facebook' ? '#1877f2' : '#ff6a00' }));
    const status = Object.keys(stMap).map((k) => ({ label: k, n: stMap[k] })).sort((a, b) => b.n - a.n);
    const people = Object.keys(pplMap).map((k) => [k, pplMap[k].count, pplMap[k].claim]).sort((a, b) => b[1] - a[1]).slice(0, 12);
    return { n: filtered.length, total_claim: tClaim, total_order: tOrder, avg_claim: filtered.length ? Math.round(tClaim / filtered.length) : 0, claim_ratio: tOrder ? (tClaim / tOrder * 100) : 0, trend: trend, source: source, status: status, people: people };
  }, [items, period, selMonth, selDate]);

  const TH_FULL = ['', 'มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน', 'กรกฎาคม', 'สิงหาคม', 'กันยายน', 'ตุลาคม', 'พฤศจิกายน', 'ธันวาคม'];
  const pBtn = (val, label) => (<button key={val} className="btn" onClick={() => setPeriod(val)} style={{ padding: '6px 16px', fontSize: 13, fontWeight: period === val ? 600 : 400, background: period === val ? 'var(--tamarind)' : 'var(--surface)', color: period === val ? '#fff' : 'var(--ink)', borderColor: period === val ? 'var(--tamarind)' : 'var(--border)' }}>{label}</button>);

  const header = (
    <>
      <div className="card-h" style={{ marginBottom: 12 }}>
        <div><h3>ภาพรวมการเคลม (ดึงสดจากชีต)</h3><div className="sub">{synced ? 'อัปเดตล่าสุด ' + synced.toLocaleString('th-TH') : 'กำลังโหลด…'}</div></div>
        <button className="btn" onClick={load} disabled={loading} style={{ padding: '6px 12px', fontSize: 13 }}>{loading ? 'กำลังโหลด…' : '↻ รีเฟรช'}</button>
      </div>
      <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', alignItems: 'center', marginBottom: 18 }}>
        {pBtn('day', 'รายวัน')}{pBtn('month', 'รายเดือน')}{pBtn('year', 'รายปี')}
        {period === 'month' && (<select style={{ ...fInp, width: 'auto' }} value={selMonth} onChange={(e) => setSelMonth(parseInt(e.target.value, 10))}>{TH_FULL.map((nm, i) => i === 0 ? null : <option key={i} value={i}>{nm}</option>)}</select>)}
        {period === 'day' && (<input type="date" style={{ ...fInp, width: 'auto' }} value={selDate} onChange={(e) => setSelDate(e.target.value)} />)}
        {A && <span style={{ fontSize: 12.5, color: 'var(--muted)' }}>ช่วงนี้มี {A.n.toLocaleString('en-US')} รายการ</span>}
      </div>
    </>
  );
  if (err) return (<div className="card">{header}<div style={{ padding: '10px 12px', borderRadius: 8, fontSize: 13, background: 'color-mix(in oklab, var(--neg) 14%, transparent)', color: 'var(--neg)' }}>{err}</div></div>);
  if (loading || !A) return (<div className="card">{header}<div style={{ color: 'var(--muted)', padding: 30, textAlign: 'center' }}>กำลังโหลดข้อมูลจากชีต…</div></div>);

  const maxClaim = Math.max(1, ...A.trend.map((t) => t.claim));
  const srcTotal = A.source.reduce((s, c) => s + c.count, 0) || 1;
  const maxPeople = (A.people[0] && A.people[0][1]) || 1;
  const trendTitle = period === 'year' ? 'ยอดเคลมรายเดือน' : (period === 'month' ? ('ยอดเคลมรายวัน · ' + TH_FULL[selMonth]) : 'ยอดเคลมวันนี้');
  const kpis = [
    { label: 'รายการเคลม', val: A.n.toLocaleString('en-US'), unit: ' รายการ', note: period === 'year' ? 'ทั้งปี' : (period === 'month' ? TH_FULL[selMonth] : selDate), color: 'var(--tamarind)' },
    { label: 'ยอดเคลมรวม', baht: true, val: fmtBaht(A.total_claim), note: 'เฉลี่ย ฿' + A.avg_claim + '/รายการ', color: 'var(--rust)' },
    { label: 'ยอดสั่งซื้อรวม', baht: true, val: fmtBaht(A.total_order), note: 'ฐานคำนวณ', color: 'var(--honey)' },
    { label: 'สัดส่วนเคลม/ยอดซื้อ', val: A.claim_ratio.toFixed(1) + '%', note: 'claim ratio', color: 'var(--leaf)' },
  ];
  return (
    <>
      {header}
      <div className="kpi-grid">
        {kpis.map((k) => (
          <div className="kpi" key={k.label} style={{ '--accent': k.color, cursor: 'default' }}>
            <div className="kpi-label"><span className="dot" style={{ background: k.color }} /><span>{k.label}</span></div>
            <div className="kpi-value">{k.baht && <span className="baht">฿</span>}{k.val}{k.unit && <span className="baht" style={{ marginLeft: 4 }}>{k.unit}</span>}</div>
            <div className="kpi-foot"><span style={{ fontSize: 12, color: 'var(--muted)' }}>{k.note}</span></div>
          </div>
        ))}
      </div>
      <div className="row-grid">
        <div className="card">
          <div className="card-h"><div><h3>{trendTitle}</h3><div className="sub">ยอดเคลม (บาท) และจำนวนรายการ</div></div></div>
          {A.trend.length === 0 ? (
            <div style={{ color: 'var(--muted)', padding: 30, textAlign: 'center' }}>เลือกดูแบบรายวัน — ดูสรุปด้านล่างได้เลย (ไม่มีกราฟแนวโน้มสำหรับวันเดียว)</div>
          ) : (
            <div style={{ display: 'flex', alignItems: 'flex-end', gap: A.trend.length > 15 ? 4 : 14, height: 220, padding: '8px 4px 0', overflowX: 'auto' }}>
              {A.trend.map((m) => (

// ─── Year picker (dropdown of years available in data) ────────
function YearPicker({ months, activeId, onSelect, onOpenManager }) {
  const [open, setOpen] = React.useState(false);
  const wrapRef = React.useRef(null);
  React.useEffect(() => {
    const onDocClick = (e) => { if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', onDocClick);
    return () => document.removeEventListener('mousedown', onDocClick);
  }, []);
  const S = window.MKW_STORE;
  const years = [...new Set(months.map(m => m.id.split('-')[0]))].sort((a, b) => b.localeCompare(a));
  const currentYear = (activeId || '').split('-')[0] || years[0];
  const pickYear = (y) => {
    const first = months.find(m => m.id.split('-')[0] === y);
    if (first) onSelect(first.id);
    setOpen(false);
  };
  // Year totals for display
  const yearStats = years.map(y => {
    const ms = months.filter(m => m.id.split('-')[0] === y);
    const tot = ms.reduce((a, m) => {
      const t = S.monthTotals(m);
      return { revenue: a.revenue + t.revenue, profit: a.profit + t.profit, count: a.count + 1 };
    }, { revenue: 0, profit: 0, count: 0 });
    return { y, ...tot };
  });
  return (
    <div ref={wrapRef} style={{ position: 'relative' }}>
      <button className="btn btn-month" onClick={() => setOpen(!open)} title="เลือกปี">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg>
        <span style={{ fontWeight: 600 }}>ปี {currentYear}</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ opacity: 0.6 }}><path d="m6 9 6 6 6-6"/></svg>
      </button>
      {open && (
        <div className="month-pop">
          <div className="month-list">
            {yearStats.map(({ y, revenue, profit, count }) => (
              <button key={y} className={`month-item ${y === currentYear ? 'on' : ''}`} onClick={() => pickYear(y)}>
                <div className="month-item-head">
                  <span className="month-item-name">ปี {y}</span>
                  <span className="month-item-badge">{count} เดือน</span>
                </div>
                <div className="month-item-stat">
                  <span>รายได้ ฿{(revenue / 1e6).toFixed(2)}M</span>
                  <span style={{ color: profit >= 0 ? 'var(--pos)' : 'var(--neg)' }}>กำไร ฿{(profit / 1e6).toFixed(2)}M</span>
                </div>
              </button>
            ))}
          </div>
          <button className="month-add" onClick={() => { setOpen(false); onOpenManager('add'); }}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>
            <span>เพิ่มเดือนใหม่</span>
          </button>
          <button className="month-add secondary" onClick={() => { setOpen(false); onOpenManager('manage'); }}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20v-6"/><path d="M6 20V10"/><path d="M18 20V4"/></svg>
            <span>จัดการ / Export-Import</span>
          </button>
        </div>
      )}
    </div>
  );
}

// ─── Date range picker (popover) ──────────────────────
function DateRangePicker({ range, onChange, period }) {
  const [open, setOpen] = React.useState(false);
  const [draft, setDraft] = React.useState(range);
  const [viewMonth, setViewMonth] = React.useState(() => {
    const d = new Date(range.end);
    return new Date(d.getFullYear(), d.getMonth(), 1);
  });
  const wrapRef = React.useRef(null);

  React.useEffect(() => setDraft(range), [range]);
  React.useEffect(() => {
    if (!open) return;
    const onDoc = (e) => {
      if (!wrapRef.current?.contains(e.target)) setOpen(false);
    };
    document.addEventListener('mousedown', onDoc);
    return () => document.removeEventListener('mousedown', onDoc);
  }, [open]);

  const fmtDate = (d) => {
    const months = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
    return `${d.getDate()} ${months[d.getMonth()]} ${(d.getFullYear() + 543) % 100}`;
  };
  const label = `${fmtDate(range.start)} – ${fmtDate(range.end)}`;

  const presets = [
    { k: '7d',  label: '7 วัน' },
    { k: '30d', label: '30 วัน' },
    { k: '90d', label: '90 วัน' },
    { k: 'mtd', label: 'เดือนนี้' },
    { k: 'qtd', label: 'ไตรมาสนี้' },
    { k: 'ytd', label: 'ปีนี้' },
  ];
  const applyPreset = (k) => {
    const today = new Date();
    let start = new Date(today);
    if (k === '7d') start.setDate(today.getDate() - 6);
    else if (k === '30d') start.setDate(today.getDate() - 29);
    else if (k === '90d') start.setDate(today.getDate() - 89);
    else if (k === 'mtd') start = new Date(today.getFullYear(), today.getMonth(), 1);
    else if (k === 'qtd') start = new Date(today.getFullYear(), Math.floor(today.getMonth() / 3) * 3, 1);
    else if (k === 'ytd') start = new Date(today.getFullYear(), 0, 1);
    setDraft({ start, end: today, preset: k });
    setViewMonth(new Date(today.getFullYear(), today.getMonth(), 1));
  };
  const apply = () => { onChange(draft); setOpen(false); };

  // Build days for two months side by side
  const buildMonth = (base) => {
    const y = base.getFullYear(), m = base.getMonth();
    const first = new Date(y, m, 1);
    const lastDate = new Date(y, m + 1, 0).getDate();
    const startWeekday = first.getDay(); // 0=Sun
    const days = [];
    // Pad for previous month
    const prevLast = new Date(y, m, 0).getDate();
    for (let i = startWeekday - 1; i >= 0; i--) {
      days.push({ d: new Date(y, m - 1, prevLast - i), dim: true });
    }
    for (let i = 1; i <= lastDate; i++) days.push({ d: new Date(y, m, i), dim: false });
    while (days.length % 7 !== 0) {
      const last = days[days.length - 1].d;
      days.push({ d: new Date(last.getFullYear(), last.getMonth(), last.getDate() + 1), dim: true });
    }
    return days;
  };

  const monthName = (d) => {
    const months = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
    return `${months[d.getMonth()]} ${d.getFullYear() + 543}`;
  };
  const sameDay = (a, b) => a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
  const inRange = (d) => draft.start && draft.end && d >= new Date(draft.start.setHours(0,0,0,0)) && d <= new Date(draft.end.setHours(23,59,59,999));

  // Selecting a day: if no start or both already set → start; else end
  const [picking, setPicking] = React.useState('start');
  const pickDay = (d) => {
    if (picking === 'start' || d < draft.start) {
      setDraft({ start: d, end: d, preset: null });
      setPicking('end');
    } else {
      setDraft({ ...draft, end: d, preset: null });
      setPicking('start');
    }
  };

  const renderMonth = (base) => {
    const days = buildMonth(base);
    return (
      <div>
        <div className="cal-head">
          {sameDay(base, viewMonth) ? (
            <button onClick={() => setViewMonth(new Date(base.getFullYear(), base.getMonth() - 1, 1))}>‹</button>
          ) : <span style={{ width: 24 }} />}
          <div>{monthName(base)}</div>
          {sameDay(base, new Date(viewMonth.getFullYear(), viewMonth.getMonth() + 1, 1)) ? (
            <button onClick={() => setViewMonth(new Date(viewMonth.getFullYear(), viewMonth.getMonth() + 1, 1))}>›</button>
          ) : <span style={{ width: 24 }} />}
        </div>
        <div className="cal-week">
          {['อา', 'จ', 'อ', 'พ', 'พฤ', 'ศ', 'ส'].map((w) => <div key={w}>{w}</div>)}
        </div>
        <div className="cal-days">
          {days.map((it, i) => {
            const isStart = sameDay(it.d, draft.start);
            const isEnd = sameDay(it.d, draft.end);
            const within = !isStart && !isEnd && inRange(new Date(it.d));
            return (
              <button key={i} className={[
                it.dim ? 'dim' : '',
                isStart ? 'range-start' : '',
                isEnd ? 'range-end' : '',
                within ? 'in-range' : '',
              ].join(' ')} onClick={() => pickDay(new Date(it.d))}>
                {it.d.getDate()}
              </button>
            );
          })}
        </div>
      </div>
    );
  };

  return (
    <div ref={wrapRef} style={{ position: 'relative' }}>
      <button className="btn" onClick={() => setOpen(!open)}>
        <Icon.cal /> <span>{label}</span> <Icon.chev style={{ width: 12, height: 12, transform: 'rotate(90deg)' }} />
      </button>
      {open && (
        <div className="date-pop" style={{ right: 0 }}>
          <div className="date-presets">
            {presets.map((p) => (
              <button key={p.k} className={draft.preset === p.k ? 'on' : ''} onClick={() => applyPreset(p.k)}>
                {p.label}
              </button>
            ))}
          </div>
          <div className="cal-grid">
            {renderMonth(viewMonth)}
            {renderMonth(new Date(viewMonth.getFullYear(), viewMonth.getMonth() + 1, 1))}
          </div>

// ─── People / HR (ระบบลงเวลาด้วยใบหน้า) ─────────────────────────
const ATTENDANCE_API = 'https://script.google.com/macros/s/AKfycbxtEYrI-LgsGP3YMEd69BdQuDXDsXFb7LxHsdFdA6-UfuvP-RwxB3vf0ImznEF2q0urfg/exec';
const FACE_MATCH_THRESHOLD = 0.48;
const FACE_MARGIN_MIN = 0.06; // ระยะห่างขั้นต่ำระหว่างคนที่ใกล้สุดกับอันดับ 2 (กันจำผิดคน)
const FACEAPI_CDN = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.13/dist/face-api.js';
const FACEAPI_MODELS = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.13/model';
const ADMIN_PASSWORD_KEY = 'mkw_admin_pw';
const DEVICE_NAME_KEY = 'mkw_device_name';

function loadFaceApi() {
  if (window._faceapiPromise) return window._faceapiPromise;
  window._faceapiPromise = new Promise((resolve, reject) => {
    if (window.faceapi) return resolve(window.faceapi);
    const s = document.createElement('script');
    s.src = FACEAPI_CDN;
    s.onload = async () => {
      try {
        await window.faceapi.nets.tinyFaceDetector.loadFromUri(FACEAPI_MODELS);
        await window.faceapi.nets.faceLandmark68Net.loadFromUri(FACEAPI_MODELS);
        await window.faceapi.nets.faceRecognitionNet.loadFromUri(FACEAPI_MODELS);
        resolve(window.faceapi);
      } catch (e) { reject(e); }
    };
    s.onerror = () => reject(new Error('โหลด face-api ไม่สำเร็จ'));
    document.body.appendChild(s);
  });
  return window._faceapiPromise;
}

async function captureDescriptor(video) {
  const faceapi = window.faceapi;
  const det = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 320, scoreThreshold: 0.5 }))
    .withFaceLandmarks().withFaceDescriptor();
  if (!det) return null;
  return { descriptor: Array.from(det.descriptor), score: det.detection.score };
}

function euclid(a, b) {
  let s = 0;
  for (let i = 0; i < a.length; i++) { const d = a[i] - b[i]; s += d * d; }
  return Math.sqrt(s);
}

function avgDescriptor(descs) {
  const n = descs.length, dim = descs[0].length;
  const out = new Array(dim).fill(0);
  for (const d of descs) for (let i = 0; i < dim; i++) out[i] += d[i];
  for (let i = 0; i < dim; i++) out[i] /= n;
  return out;
}

function empMinDistance(desc, emp) {
  // รองรับทั้งใบหน้ารูปเดียว (descriptor) และหลายรูป (descriptors[]) — เลือกระยะที่ใกล้สุด
  let list = [];
  if (Array.isArray(emp.descriptors) && emp.descriptors.length) list = emp.descriptors;
  else if (Array.isArray(emp.descriptor)) list = [emp.descriptor];
  let min = Infinity;
  for (const d of list) { if (Array.isArray(d) && d.length) { const e = euclid(desc, d); if (e < min) min = e; } }
  return min;
}
function matchBest(desc, employees) {
  let best = null, second = null;
  for (const emp of employees) {
    if (emp.status !== 'active') continue;
    const d = empMinDistance(desc, emp);
    if (!isFinite(d)) continue;
    if (best == null || d < best.distance) { second = best; best = { emp, distance: d }; }
    else if (second == null || d < second.distance) { second = { emp, distance: d }; }
  }
  if (best) best.margin = second ? (second.distance - best.distance) : 99;
  return best;
}

async function getGPS() {
  return new Promise((resolve) => {
    if (!navigator.geolocation) return resolve(null);
    navigator.geolocation.getCurrentPosition(
      (p) => resolve({ lat: p.coords.latitude, lng: p.coords.longitude, accuracy: p.coords.accuracy }),
      () => resolve(null),
      { enableHighAccuracy: true, timeout: 8000, maximumAge: 30000 }
    );
  });
}

function haversineMeters(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const toRad = (x) => x * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function nearestLocation(lat, lng, locations) {
  let best = null;
  for (const loc of locations) {
    if (loc.status !== 'active') continue;
    const d = haversineMeters(lat, lng, loc.lat, loc.lng);
    if (best == null || d < best.distance) best = { loc, distance: d };
  }
  return best;
}

// network helper: retry on transient failures (e.g. Apps Script cold start -> Failed to fetch)
function fetchWithRetry(url, opts, tries) {
  tries = tries || 3;
  return new Promise(function (resolve, reject) {
    (function attempt(n) {
      var ctrl = new AbortController();
      var to = setTimeout(function () { ctrl.abort(); }, 20000);
      fetch(url, Object.assign({ signal: ctrl.signal }, opts || {}))
        .then(function (r) { clearTimeout(to); resolve(r); })
        .catch(function (e) {
          clearTimeout(to);
          if (n <= 1) { reject(e); return; }
          setTimeout(function () { attempt(n - 1); }, 800);
        });
    })(tries);
  });
}

async function apiPost(action, body) {
  const r = await fetchWithRetry(ATTENDANCE_API, {
    method: 'POST',
    body: JSON.stringify(Object.assign({ action }, body)),
    redirect: 'follow',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
  }, 3);
  return r.json();
}

async function apiGet(action, params) {
  const url = new URL(ATTENDANCE_API);
  url.searchParams.set('action', action);
  if (params) for (const k in params) url.searchParams.set(k, params[k]);
  const r = await fetchWithRetry(url.toString(), {}, 3);
  return r.json();
}

function CameraView({ onReady, mirror = true, maxWidth = 480 }) {
  const videoRef = React.useRef(null);
  const [err, setErr] = React.useState(null);
  React.useEffect(() => {
    let stream = null;
    async function start() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, facingMode: 'user' }, audio: false });
        if (videoRef.current) {
          videoRef.current.srcObject = stream;
          videoRef.current.onloadedmetadata = () => {
            videoRef.current.play();
            if (onReady) onReady(videoRef.current);
          };
        }
      } catch (e) { setErr(e.message || 'เปิดกล้องไม่ได้'); }
    }
    start();
    return () => { if (stream) stream.getTracks().forEach(t => t.stop()); };
  }, []);
  if (err) return <div style={{ padding: 20, color: '#dc2626' }}>⚠️ {err}</div>;
  return (
    <video ref={videoRef} autoPlay muted playsInline
      style={{ width: '100%', maxWidth: maxWidth, borderRadius: 12, transform: mirror ? 'scaleX(-1)' : 'none', background: '#000' }} />

}

function ClockPanel({ employees, locations, modelsReady, onLogged, deviceName }) {
  const [busy, setBusy] = React.useState(false);
  const [msg, setMsg] = React.useState(null);
  const [type, setType] = React.useState(null);
  const videoRef = React.useRef(null);

  const doClock = async (clockType) => {
    if (!modelsReady) { setMsg({ kind: 'err', text: 'กำลังโหลดระบบ รอสักครู่...' }); return; }
    if (!videoRef.current) { setMsg({ kind: 'err', text: 'ยังไม่ได้เปิดกล้อง' }); return; }
    if (employees.length === 0) { setMsg({ kind: 'err', text: 'ยังไม่มีพนักงานในระบบ — ผู้ดูแลกรุณาลงทะเบียนก่อน' }); return; }
    setBusy(true); setType(clockType); setMsg({ kind: 'info', text: 'กำลังตรวจสอบตำแหน่ง...' });
    try {
      const gps = await getGPS();
      const activeLocs = (locations || []).filter(l => l.status === 'active');
      if (activeLocs.length > 0) {
        if (!gps) {
          setMsg({ kind: 'err', text: '⛔ ไม่สามารถระบุพิกัด GPS — ลงเวลาไม่ได้ (กรุณาเปิด location ใน browser)' });
          setBusy(false); setType(null); return;
        }
        const near = nearestLocation(gps.lat, gps.lng, activeLocs);
        if (!near || near.distance > near.loc.radius) {
          setMsg({ kind: 'err', text: '⛔ อยู่นอกพื้นที่กำหนด' + (near ? ' · ห่าง ' + Math.round(near.distance) + ' ม. จาก ' + near.loc.name + ' (รัศมี ' + near.loc.radius + ' ม.)' : '') });
          setBusy(false); setType(null); return;
        }
      }
      setMsg({ kind: 'info', text: 'กำลังสแกนใบหน้า...' });
      const captured = await captureDescriptor(videoRef.current);
      if (!captured) { setMsg({ kind: 'err', text: 'ไม่พบใบหน้า — กรุณาหันหน้าตรงและให้แสงสว่างเพียงพอ' }); setBusy(false); setType(null); return; }
      const best = matchBest(captured.descriptor, employees);
      if (!best || best.distance > FACE_MATCH_THRESHOLD) {
        setMsg({ kind: 'err', text: 'ไม่พบข้อมูลใบหน้านี้ในระบบ' + (best ? ' (ระยะ ' + best.distance.toFixed(2) + ')' : '') });
        setBusy(false); setType(null); return;
      }
      if (best.margin < FACE_MARGIN_MIN) {
        setMsg({ kind: 'err', text: '⚠️ ใบหน้าใกล้เคียงกับหลายคน — กรุณาสแกนใหม่ (หันหน้าตรง แสงสว่างพอ)' });
        setBusy(false); setType(null); return;
      }
      const confirmed = window.confirm('ยืนยัน: คุณคือ ' + best.emp.name + ' ใช่หรือไม่?\n\nกด ตกลง เพื่อบันทึกการลงเวลา\nกด ยกเลิก ถ้าไม่ใช่');
      if (!confirmed) {
        setMsg({ kind: 'info', text: 'ยกเลิกการลงเวลา' });
        setBusy(false); setType(null); return;
      }
      if (clockType === 'in' || clockType === 'in_night') {
        const today = new Date().toISOString().slice(0, 10);
        const todayLogs = await apiGet('list_logs', { from: today, to: today });
        const alreadyIn = (todayLogs.logs || []).some(l =>
          l.empId === best.emp.id && (l.type === 'in' || l.type === 'in_night')
        );
        if (alreadyIn) {
          const doAgain = window.confirm('วันนี้คุณลงเวลาเข้างานแล้ว คุณจะทำอีกครั้งหรือไม่');
          if (!doAgain) {
            setMsg({ kind: 'ok', text: '✓ ' + best.emp.name + ' · ไม่มีการบันทึกเวลาซ้ำ' });
            setBusy(false); setType(null); return;
          }
        }
      }
      setMsg({ kind: 'info', text: 'พบ ' + best.emp.name + ' กำลังบันทึก...' });
      const res = await apiPost('clock', {
        empId: best.emp.id,
        name: best.emp.name,
        type: clockType,
        lat: gps ? gps.lat : '',
        lng: gps ? gps.lng : '',
        matchScore: (1 - best.distance).toFixed(3),
        device: deviceName || ''
      });
      if (res.ok) {

function RegisterPanel({ onDone, onCancel, modelsReady }) {
  const [step, setStep] = React.useState(1);
  const [form, setForm] = React.useState({ name: '', position: 'แอดมิน' });
  const [samples, setSamples] = React.useState([]);
  const [scanning, setScanning] = React.useState(false);
  const [msg, setMsg] = React.useState(null);
  const [saving, setSaving] = React.useState(false);
  const videoRef = React.useRef(null);
  const TARGET_SAMPLES = 3;

  const next = () => {
    if (!form.name.trim()) { setMsg('กรุณากรอกชื่อ'); return; }
    setMsg(null); setStep(2);
  };

  const captureOne = async () => {
    if (!modelsReady) { setMsg('กำลังโหลดระบบ รอสักครู่...'); return; }
    if (!videoRef.current) { setMsg('ยังไม่ได้เปิดกล้อง'); return; }
    setScanning(true); setMsg('กำลังสแกน...');
    const c = await captureDescriptor(videoRef.current);
    setScanning(false);
    if (!c) { setMsg('ไม่พบใบหน้า — ลองอีกครั้ง'); return; }
    setSamples(prev => [...prev, c.descriptor]);
    setMsg(null);
  };

  const finish = async () => {
    setSaving(true); setMsg('กำลังบันทึก...');
    const avg = avgDescriptor(samples);
    const res = await apiPost('register', {
      name: form.name.trim(),
      position: form.position,
      descriptor: avg
    });
    setSaving(false);
    if (res.ok) { setStep(3); setTimeout(() => onDone && onDone(), 1500); }
    else setMsg('บันทึกไม่สำเร็จ: ' + (res.error || 'unknown'));
  };

  if (step === 3) return (
    <div className="card" style={{ padding: 40, textAlign: 'center' }}>
      <div style={{ fontSize: 60, marginBottom: 12 }}>✅</div>
      <div style={{ fontSize: 20, fontWeight: 600, color: '#065f46' }}>ลงทะเบียนสำเร็จ</div>
      <div style={{ color: 'var(--muted)', marginTop: 6 }}>{form.name} · {form.position}</div>
    </div>
  );

  if (step === 1) return (
    <div className="card" style={{ padding: 24, maxWidth: 520, margin: '0 auto' }}>
      <h3 style={{ margin: '0 0 16px', color: '#064e3b' }}>ลงทะเบียนพนักงานใหม่</h3>
      <div style={{ display: 'grid', gap: 14 }}>
        <label style={{ display: 'grid', gap: 4 }}>
          <span style={{ fontSize: 13, color: 'var(--muted)' }}>ชื่อ-นามสกุล *</span>
          <input value={form.name} onChange={e => setForm({ ...form, name: e.target.value })}
            placeholder="เช่น สมชาย ใจดี" style={{ padding: '10px 12px', fontSize: 15, border: '1px solid var(--border)', borderRadius: 8 }} />
        </label>
        <label style={{ display: 'grid', gap: 4 }}>
          <span style={{ fontSize: 13, color: 'var(--muted)' }}>ตำแหน่งงาน *</span>
          <select value={form.position} onChange={e => setForm({ ...form, position: e.target.value })}
            style={{ padding: '10px 12px', fontSize: 15, border: '1px solid var(--border)', borderRadius: 8 }}>
            <option value="แอดมิน">แอดมิน</option>
            <option value="ไลฟ์">ไลฟ์</option>
            <option value="จัดเตรียม">จัดเตรียม</option>
            <option value="จัดแพ็ค">จัดแพ็ค</option>
          </select>
        </label>
        {msg && <div style={{ color: '#dc2626', fontSize: 13 }}>{msg}</div>}
        <div style={{ display: 'flex', gap: 10, marginTop: 6 }}>
          <button onClick={onCancel} style={{ flex: 1, padding: '10px', borderRadius: 8, border: '1px solid var(--border)', background: 'transparent', cursor: 'pointer' }}>ยกเลิก</button>
          <button onClick={next} style={{ flex: 2, padding: '10px', borderRadius: 8, border: 'none', background: '#10b981', color: '#fff', fontWeight: 600, cursor: 'pointer' }}>ถัดไป — สแกนใบหน้า</button>
        </div>
      </div>
    </div>
  );

  return (
    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(320px, 1fr))', gap: 16, maxWidth: 900, margin: '0 auto' }}>
      <div className="card" style={{ padding: 20 }}>
        <CameraView onReady={(v) => { videoRef.current = v; }} />
      </div>
      <div className="card" style={{ padding: 20 }}>
        <h3 style={{ margin: '0 0 12px', color: '#064e3b' }}>สแกนใบหน้า {form.name}</h3>
        <div style={{ color: 'var(--muted)', fontSize: 13, marginBottom: 14 }}>กรุณาหันหน้าเข้ากล้อง แล้วกด "ถ่ายตัวอย่าง" {TARGET_SAMPLES} ครั้ง (มุมตรง · เอียงซ้าย · เอียงขวา)</div>
        <div style={{ display: 'flex', gap: 8, marginBottom: 14, justifyContent: 'center' }}>
          {[...Array(TARGET_SAMPLES)].map((_, i) => (
            <div key={i} style={{ width: 50, height: 50, borderRadius: '50%', background: samples[i] ? '#10b981' : '#e5e7eb', color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 22, fontWeight: 700 }}>{samples[i] ? '✓' : i + 1}</div>
          ))}
        </div>
        {msg && <div style={{ padding: 10, borderRadius: 6, background: '#fef3c7', color: '#92400e', fontSize: 13, marginBottom: 10 }}>{msg}</div>}
        {samples.length < TARGET_SAMPLES ? (
          <button onClick={captureOne} disabled={scanning} style={{ width: '100%', padding: '14px', borderRadius: 8, border: 'none', background: '#10b981', color: '#fff', fontWeight: 600, fontSize: 16, cursor: scanning ? 'wait' : 'pointer' }}>
            {scanning ? 'กำลังสแกน...' : '📸 ถ่ายตัวอย่าง ' + (samples.length + 1) + '/' + TARGET_SAMPLES}
          </button>
        ) : (
          <button onClick={finish} disabled={saving} style={{ width: '100%', padding: '14px', borderRadius: 8, border: 'none', background: '#0ea5e9', color: '#fff', fontWeight: 600, fontSize: 16, cursor: saving ? 'wait' : 'pointer' }}>
            {saving ? 'กำลังบันทึก...' : '💾 บันทึก'}
          </button>
        )}
        <button onClick={() => setSamples([])} disabled={saving || samples.length === 0} style={{ width: '100%', padding: '8px', marginTop: 8, borderRadius: 6, border: '1px solid var(--border)', background: 'transparent', cursor: 'pointer', fontSize: 13, opacity: samples.length === 0 ? 0.4 : 1 }}>ล้างทั้งหมด แล้วเริ่มใหม่</button>
        <button onClick={onCancel} style={{ width: '100%', padding: '8px', marginTop: 6, borderRadius: 6, border: 'none', background: 'transparent', cursor: 'pointer', fontSize: 13, color: 'var(--muted)' }}>← กลับ</button>
      </div>
    </div>
  );
}

function isLateClockIn(timestamp) {
  const d = new Date(timestamp);
  const h = d.getHours(), m = d.getMinutes();
  return h > 8 || (h === 8 && m > 0);
}
function minutesLateFrom8(timestamp) {
  const d = new Date(timestamp);
  const cutoff = new Date(d); cutoff.setHours(8, 0, 0, 0);
  return Math.max(0, Math.round((d - cutoff) / 60000));
}
function isLateNight(timestamp) {
  const d = new Date(timestamp);
  const h = d.getHours(), m = d.getMinutes();
  return h > 17 || (h === 17 && m > 0);
}
function minutesLateFrom17(timestamp) {
  const d = new Date(timestamp);
  const cutoff = new Date(d); cutoff.setHours(17, 0, 0, 0);
  return Math.max(0, Math.round((d - cutoff) / 60000));
}
function isEarlyOut(timestamp) {
  const d = new Date(timestamp);
  return d.getHours() < 17;
}
function minutesEarlyBefore17(timestamp) {
  const d = new Date(timestamp);
  const cutoff = new Date(d); cutoff.setHours(17, 0, 0, 0);
  return Math.max(0, Math.round((cutoff - d) / 60000));
}

function AttendanceLogs({ employees, onClose }) {
  const [logs, setLogs] = React.useState([]);
  const [loading, setLoading] = React.useState(false);
  const [from, setFrom] = React.useState(() => { const d = new Date(); d.setDate(1); return ymd(d); });
  const [to, setTo] = React.useState(() => ymd(new Date()));
  const [selectedEmp, setSelectedEmp] = React.useState('');

  const setPreset = (kind) => {
    const now = new Date();
    if (kind === 'today') { const d = ymd(now); setFrom(d); setTo(d); }
    else if (kind === 'last7') { const s = new Date(now); s.setDate(now.getDate() - 6); setFrom(ymd(s)); setTo(ymd(now)); }
    else if (kind === 'month') { setFrom(ymd(new Date(now.getFullYear(), now.getMonth(), 1))); setTo(ymd(now)); }
    else if (kind === 'lastMonth') { const s = new Date(now.getFullYear(), now.getMonth() - 1, 1); const e = new Date(now.getFullYear(), now.getMonth(), 0); setFrom(ymd(s)); setTo(ymd(e)); }
  };

  const load = React.useCallback(async () => {
    setLoading(true);
    const r = await apiGet('list_logs', { from, to });
    setLogs(r.logs || []);
    setLoading(false);
  }, [from, to]);
  React.useEffect(() => { load(); }, [load]);

  const filtered = selectedEmp ? logs.filter(l => l.empId === selectedEmp) : logs;
  const sortedEmps = (employees || []).slice().sort((a, b) => a.name.localeCompare(b.name, 'th'));

  return (
    <div className="card" style={{ padding: 20 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 10, marginBottom: 12 }}>
        <h3 style={{ margin: 0, color: '#064e3b' }}>บันทึกการลงเวลา ({filtered.length} รายการ)</h3>
        <button onClick={onClose} style={{ padding: '6px 12px', borderRadius: 6, border: '1px solid var(--border)', background: 'transparent', cursor: 'pointer' }}>← กลับ</button>
      </div>
      <div style={{ display: 'flex', flexWrap: 'wrap', alignItems: 'center', gap: 8, marginBottom: 14, padding: 12, background: '#f0fdfa', borderRadius: 8 }}>
        {[
          { k: 'today', label: 'วันนี้' },
          { k: 'last7', label: '7 วันล่าสุด' },
          { k: 'month', label: 'เดือนนี้' },
          { k: 'lastMonth', label: 'เดือนที่แล้ว' }
        ].map(p => (
          <button key={p.k} onClick={() => setPreset(p.k)} style={{ padding: '6px 12px', fontSize: 13, borderRadius: 6, border: '1px solid var(--border)', background: '#fff', cursor: 'pointer' }}>{p.label}</button>
        ))}
        <div style={{ width: 1, height: 24, background: 'var(--border)', margin: '0 4px' }} />
        <span style={{ fontSize: 12, color: 'var(--muted)' }}>จาก</span>
        <input type="date" value={from} onChange={e => setFrom(e.target.value)} style={{ padding: '5px 8px', fontSize: 13, border: '1px solid var(--border)', borderRadius: 6 }} />
        <span style={{ fontSize: 12, color: 'var(--muted)' }}>ถึง</span>
        <input type="date" value={to} onChange={e => setTo(e.target.value)} style={{ padding: '5px 8px', fontSize: 13, border: '1px solid var(--border)', borderRadius: 6 }} />
        <div style={{ width: 1, height: 24, background: 'var(--border)', margin: '0 4px' }} />
        <span style={{ fontSize: 12, color: 'var(--muted)' }}>พนักงาน</span>
        <select value={selectedEmp} onChange={e => setSelectedEmp(e.target.value)} style={{ padding: '5px 8px', fontSize: 13, border: '1px solid var(--border)', borderRadius: 6, minWidth: 160 }}>
          <option value="">ทั้งหมด ({logs.length})</option>
          {sortedEmps.map(e => (
            <option key={e.id} value={e.id}>{e.name}</option>
          ))}
        </select>
      </div>
      {loading ? <div style={{ padding: 30, textAlign: 'center' }}>กำลังโหลด...</div> :
       filtered.length === 0 ? <div style={{ padding: 30, textAlign: 'center', color: 'var(--muted)' }}>ไม่พบรายการ</div> : (
        <div style={{ maxHeight: 480, overflowY: 'auto' }}>
          <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 14 }}>
            <thead style={{ position: 'sticky', top: 0, background: 'var(--bg)' }}>
              <tr style={{ borderBottom: '2px solid var(--border)', textAlign: 'left' }}>
                <th style={{ padding: '8px 6px', color: 'var(--muted)' }}>วันที่-เวลา</th>
                <th style={{ padding: '8px 6px', color: 'var(--muted)' }}>พนักงาน</th>
                <th style={{ padding: '8px 6px', color: 'var(--muted)' }}>ประเภท</th>
                <th style={{ padding: '8px 6px', color: 'var(--muted)' }}>พิกัด</th>
                <th style={{ padding: '8px 6px', color: 'var(--muted)' }}>เครื่อง</th>
              </tr>
            </thead>
            <tbody>
              {filtered.slice().reverse().map((l, i) => {
                const lateDay = l.type === 'in' && isLateClockIn(l.timestamp);
                const lateNight = l.type === 'in_night' && isLateNight(l.timestamp);
                const lateMin = lateDay ? minutesLateFrom8(l.timestamp) : lateNight ? minutesLateFrom17(l.timestamp) : 0;
                const earlyOut = l.type === 'out' && isEarlyOut(l.timestamp);
                const rowBg = 'transparent';
                let badgeText, badgeBg, badgeColor;
                if (lateDay) { badgeText = 'เข้าสาย · ' + lateMin + ' นาที'; badgeBg = '#fed7aa'; badgeColor = '#9a3412'; }
                else if (lateNight) { badgeText = 'เข้ากลางคืนสาย · ' + lateMin + ' นาที'; badgeBg = '#fed7aa'; badgeColor = '#9a3412'; }
                else if (l.type === 'in') { badgeText = 'เข้า'; badgeBg = '#d1fae5'; badgeColor = '#065f46'; }
                else if (l.type === 'in_night') { badgeText = '🌙 เข้ากลางคืน'; badgeBg = '#ede9fe'; badgeColor = '#5b21b6'; }
                else if (l.type === 'out' && isEarlyOut(l.timestamp)) { badgeText = 'ออกก่อนเวลา · ' + minutesEarlyBefore17(l.timestamp) + ' นาที'; badgeBg = '#fee2e2'; badgeColor = '#991b1b'; }
                else { badgeText = 'ออก'; badgeBg = '#fee2e2'; badgeColor = '#991b1b'; }
                return (
                  <tr key={i} style={{ borderBottom: '1px solid var(--border)', background: rowBg }}>
                    <td style={{ padding: '8px 6px' }}>{new Date(l.timestamp).toLocaleString('th-TH')}</td>
                    <td style={{ padding: '8px 6px', fontWeight: 500 }}>{l.name} <span style={{ color: 'var(--muted)', fontSize: 11 }}>({l.empId})</span></td>
                    <td style={{ padding: '8px 6px' }}>
                      <span style={{ padding: '2px 8px', borderRadius: 10, fontSize: 12, fontWeight: 500, background: badgeBg, color: badgeColor }}>{badgeText}</span>
                    </td>
                    <td style={{ padding: '8px 6px', fontSize: 12, color: 'var(--muted)' }}>{l.lat && l.lng ? Number(l.lat).toFixed(4) + ', ' + Number(l.lng).toFixed(4) : '—'}</td>
                    <td style={{ padding: '8px 6px', fontSize: 12, color: 'var(--muted)' }}>{l.device || '—'}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

function LocationMap({ value, onChange, radius }) {
  const ref = React.useRef(null);
  const stateRef = React.useRef({});
  React.useEffect(() => {
    if (!window.L || !ref.current) return;
    const initLat = (value && value.lat) || 13.7563;
    const initLng = (value && value.lng) || 100.5018;
    const map = window.L.map(ref.current).setView([initLat, initLng], 17);
    window.L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19, attribution: '© OpenStreetMap'
    }).addTo(map);
    const marker = window.L.marker([initLat, initLng], { draggable: true }).addTo(map);
    const circle = window.L.circle([initLat, initLng], { radius: radius || 200, color: '#8b5cf6', fillOpacity: 0.15 }).addTo(map);
    stateRef.current = { map, marker, circle };
    marker.on('dragend', (e) => {
      const p = e.target.getLatLng();
      circle.setLatLng(p);
      if (onChange) onChange({ lat: p.lat, lng: p.lng });
    });
    map.on('click', (e) => {
      marker.setLatLng(e.latlng);
      circle.setLatLng(e.latlng);
      if (onChange) onChange({ lat: e.latlng.lat, lng: e.latlng.lng });
    });
    return () => map.remove();
  }, []);
  React.useEffect(() => {
    if (stateRef.current.circle) stateRef.current.circle.setRadius(radius || 200);
  }, [radius]);
  React.useEffect(() => {
    if (!value || !stateRef.current.map) return;
    const { marker, circle, map } = stateRef.current;
    marker.setLatLng([value.lat, value.lng]);
    circle.setLatLng([value.lat, value.lng]);
    map.setView([value.lat, value.lng], map.getZoom());
  }, [value && value.lat, value && value.lng]);
  return <div ref={ref} style={{ height: 400, borderRadius: 12, border: '1px solid var(--border)', zIndex: 1 }} />;
}

function LocationManager({ onClose, onChanged }) {
  const [locations, setLocations] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [mode, setMode] = React.useState('list');
  const [editingId, setEditingId] = React.useState(null);
  const [form, setForm] = React.useState({ name: '', lat: 13.7563, lng: 100.5018, radius: 200 });
  const [saving, setSaving] = React.useState(false);
  const [search, setSearch] = React.useState('');

  const load = React.useCallback(async () => {
    setLoading(true);
    const r = await apiGet('list_locations');
    setLocations(r.locations || []);
    setLoading(false);
  }, []);
  React.useEffect(() => { load(); }, [load]);

  const startAdd = () => {
    setForm({ name: '', lat: 13.7563, lng: 100.5018, radius: 200 });
    setEditingId(null);
    setMode('add');
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        p => setForm(prev => ({ ...prev, lat: p.coords.latitude, lng: p.coords.longitude })),
        () => {}, { enableHighAccuracy: true, timeout: 6000 }
      );
    }
  };

  const startEdit = (loc) => {
    setForm({ name: loc.name, lat: loc.lat, lng: loc.lng, radius: loc.radius });
    setEditingId(loc.id);
    setMode('edit');
  };

  const save = async () => {
    if (!form.name.trim()) { alert('กรุณากรอกชื่อสถานที่'); return; }
    setSaving(true);
    const action = mode === 'add' ? 'add_location' : 'update_location';
    const body = mode === 'add' ? form : { id: editingId, ...form };
    const r = await apiPost(action, body);
    setSaving(false);
    if (r.ok) { setMode('list'); await load(); onChanged && onChanged(); }
    else alert('ผิดพลาด: ' + (r.error || 'unknown'));
  };

  const remove = async (loc) => {
    if (!confirm('ลบสถานที่ "' + loc.name + '" ใช่หรือไม่?')) return;
    await apiPost('delete_location', { id: loc.id });
    await load(); onChanged && onChanged();
  };

  const doSearch = async () => {
    if (!search.trim()) return;
    try {
      const r = await fetch('https://nominatim.openstreetmap.org/search?q=' + encodeURIComponent(search) + '&format=json&limit=1');
      const data = await r.json();
      if (data && data[0]) {
        setForm(prev => ({ ...prev, lat: Number(data[0].lat), lng: Number(data[0].lon) }));
      } else alert('ไม่พบสถานที่');

        <div style={{ padding: 30, textAlign: 'center', color: 'var(--muted)' }}>
