<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard การเงิน · บจก.มะขามหวานพอดี</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #f0f9ff;
    --bg-2: #e0f2fe;
    --surface: #ffffff;
    --surface-2: #f8fafc;
    --border: rgba(15, 23, 42, 0.10);
    --border-2: rgba(15, 23, 42, 0.18);
    --ink: #0f172a;
    --ink-2: #334155;
    --muted: #64748b;
    --faint: #94a3b8;

    --tamarind: #0284c7;
    --amber: #14b8a6;
    --honey: #06b6d4;
    --leaf: #22c55e;
    --rust: #475569;
    --berry: #6366f1;
    --sky: #0ea5e9;
    --grape: #8b5cf6;
    --pos: #16a34a;
    --neg: #4f46e5;

    --radius: 14px;
    --radius-sm: 10px;
    --pad: 20px;

    --shadow-1: 0 1px 0 rgba(28,25,23,0.02), 0 1px 2px rgba(28,25,23,0.04);
    --shadow-2: 0 1px 0 rgba(28,25,23,0.02), 0 8px 24px rgba(28,25,23,0.06);

    --font-thai: "IBM Plex Sans Thai", "IBM Plex Sans", system-ui, sans-serif;
    --font-num: "JetBrains Mono", "IBM Plex Mono", ui-monospace, monospace;
  }

  [data-theme="dark"] {
    --bg: #1c1917;
    --bg-2: #292524;
    --surface: #292524;
    --surface-2: #1f1d1c;
    --border: rgba(250, 247, 242, 0.08);
    --border-2: rgba(250, 247, 242, 0.16);
    --ink: #fafaf9;
    --ink-2: #e7e5e4;
    --muted: #a8a29e;
    --faint: #78716c;
    --tamarind: #fbbf24;
    --amber: #f59e0b;
    --honey: #fbbf24;
    --leaf: #a3e635;
    --rust: #fb923c;
    --pos: #4ade80;
    --neg: #f87171;
    --shadow-1: 0 1px 0 rgba(0,0,0,0.2), 0 1px 2px rgba(0,0,0,0.3);
    --shadow-2: 0 1px 0 rgba(0,0,0,0.2), 0 8px 24px rgba(0,0,0,0.4);
  }

  [data-accent="amber"] { --tamarind: #b45309; --honey: #d97706; --leaf: #65a30d; }
  [data-accent="forest"] { --tamarind: #166534; --honey: #15803d; --leaf: #84cc16; }
  [data-accent="slate"] { --tamarind: #1e293b; --honey: #475569; --leaf: #0ea5e9; }

  [data-density="compact"] { --pad: 14px; --radius: 10px; }
  [data-density="comfy"] { --pad: 26px; }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-thai);
    background: var(--bg);
    color: var(--ink);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-feature-settings: "ss01" on;
  }
  .num { font-family: var(--font-num); font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }

  /* ─── App layout ─────────────────────────────── */
  .app {
    display: grid;
    grid-template-columns: 240px 1fr;
    min-height: 100vh;
  }

  /* ─── Sidebar (desktop) ──────────────────────── */
  .sidebar {
    border-right: 1px solid var(--border);
    background: var(--bg);
    display: flex;
    flex-direction: column;
    padding: 22px 16px 18px;
    position: sticky;
    top: 0;
    height: 100vh;
  }
  .brand {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    padding: 16px 6px 22px;
    text-align: center;
    line-height: 1;
    gap: 4px;
  }
  .brand .b0 {
    font-family: "IBM Plex Sans", system-ui, sans-serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.32em;
    color: #1a1a1a;
    text-transform: capitalize;
    padding-right: 0;
    text-indent: 0.32em;
  }
  .brand .b1 {
    font-family: "IBM Plex Sans", system-ui, sans-serif;
    font-weight: 800;
    font-size: 30px;
    color: #c94370;
    letter-spacing: 0.12em;
    text-indent: 0.12em;
    text-transform: uppercase;
    line-height: 1;
    padding-top: 2px;
  }
  .brand .b2 {
    margin-top: 8px;
    font-size: 11px;
    color: #27272a;
    font-weight: 500;
    letter-spacing: 0.04em;
  }

  .nav { display: flex; flex-direction: column; gap: 2px; padding-top: 6px; }
  .nav-section {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--faint);
    text-transform: uppercase;
    padding: 14px 8px 6px;
  }
  .nav a {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 8px;
    color: var(--ink-2);
    text-decoration: none;
    font-size: 13.5px;
    cursor: pointer;
    user-select: none;
  }
  .nav a:hover { background: var(--bg-2); }
  .nav a.active { background: var(--surface); color: var(--ink); box-shadow: var(--shadow-1); font-weight: 500; }
  .nav a svg { width: 16px; height: 16px; opacity: 0.7; flex-shrink: 0; }
  .nav a.active svg { opacity: 1; color: var(--tamarind); }

  .sidebar-foot {
    margin-top: auto;
    padding: 10px 8px;
    border-top: 1px solid var(--border);
    display: flex; gap: 10px; align-items: center;
  }
  .avatar {
    width: 30px; height: 30px; border-radius: 50%;
    background: linear-gradient(135deg, var(--honey), var(--tamarind));
    color: #fbf8f3;
    display: grid; place-items: center;
    font-size: 12px; font-weight: 600;
    flex-shrink: 0;
  }

  /* ─── Main content ───────────────────────────── */
  .main { padding: 22px 32px 80px; min-width: 0; }

  /* ─── Header / page title ────────────────────── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 22px;
  }
  .page-title h1 {
    font-size: 22px;
    font-weight: 600;
    margin: 0;
    letter-spacing: -0.01em;
  }
  .page-title .crumb {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .topbar-tools { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

  /* ─── Period segmented + date picker ─────────── */
  .seg {
    display: inline-flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 3px;
    box-shadow: var(--shadow-1);
    position: relative;
  }
  .seg-thumb {
    position: absolute;
    top: 3px; bottom: 3px;
    background: var(--ink);
    border-radius: 7px;
    transition: left 220ms cubic-bezier(.3,.8,.4,1), width 220ms cubic-bezier(.3,.8,.4,1);
    z-index: 0;
  }
  [data-theme="dark"] .seg-thumb { background: var(--ink); color: var(--bg); }
  .seg button {
    appearance: none;
    border: 0;
    background: transparent;
    color: var(--ink-2);
    font: inherit;
    font-weight: 500;
    font-size: 13px;
    padding: 6px 14px;
    border-radius: 7px;
    cursor: pointer;
    position: relative;
    z-index: 1;
    transition: color 180ms;
    white-space: nowrap;
  }
  .seg button.on { color: var(--bg); }
  [data-theme="dark"] .seg button.on { color: var(--bg); }

  .btn {
    appearance: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 12px;
    font: inherit;
    color: var(--ink);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    box-shadow: var(--shadow-1);
    white-space: nowrap;
  }
  .btn:hover { background: var(--surface-2); }
  .btn svg { width: 14px; height: 14px; opacity: 0.7; }
  .btn-primary { background: var(--ink); color: var(--bg); border-color: transparent; }
  .btn-primary:hover { background: var(--ink-2); }
  .btn-primary svg { color: var(--bg); opacity: 0.9; }

  .btn-refresh { color: var(--ink); }
  .btn-refresh:hover { background: color-mix(in oklab, var(--leaf) 10%, var(--surface)); border-color: color-mix(in oklab, var(--leaf) 35%, var(--border-2)); }
  .btn-refresh svg { color: var(--leaf); opacity: 1; }
  .btn-refresh:disabled { opacity: 0.7; cursor: wait; }
  .btn-refresh.spinning svg { animation: spin 0.9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ─── Month switcher ─────────────────────────── */
  .btn-month {
    background: linear-gradient(135deg, var(--surface), color-mix(in oklab, var(--tamarind) 8%, var(--surface)));
    border: 1px solid color-mix(in oklab, var(--tamarind) 25%, var(--border-2));
    color: var(--ink);
    font-weight: 500;
  }
  .btn-month:hover { background: color-mix(in oklab, var(--tamarind) 12%, var(--surface)); }
  .btn-month svg:first-of-type { color: var(--tamarind); opacity: 1; }

  .month-pop {
    position: absolute; z-index: 100; top: 100%; left: 0;
    margin-top: 6px;
    background: var(--surface);
    border: 1px solid var(--border-2);
    border-radius: 14px;
    box-shadow: var(--shadow-2);
    padding: 6px;
    width: 280px;
    max-height: 400px; overflow: auto;
  }
  .month-list { display: flex; flex-direction: column; gap: 2px; }
  .month-item {
    appearance: none; border: 0; background: transparent;
    font: inherit; color: var(--ink);
    padding: 9px 10px; border-radius: 9px;
    text-align: left; cursor: pointer;
    display: flex; flex-direction: column; gap: 4px;
  }
  .month-item:hover { background: var(--bg-2); }
  .month-item.on { background: color-mix(in oklab, var(--tamarind) 10%, var(--surface-2)); border: 1px solid color-mix(in oklab, var(--tamarind) 30%, transparent); padding: 8px 9px; }
  .month-item-head { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .month-item-name { font-weight: 600; font-size: 13.5px; }
  .month-item-badge {
    font-size: 9.5px; padding: 1px 6px; border-radius: 999px;
    background: color-mix(in oklab, var(--leaf) 18%, transparent);
    color: var(--pos); font-weight: 600; letter-spacing: 0.02em;
  }
  .month-item-stat {
    display: flex; gap: 12px; font-size: 11.5px; color: var(--muted);
    font-family: var(--font-num);
  }
  .month-add {
    display: flex; align-items: center; gap: 8px;
    appearance: none; background: var(--ink); color: var(--bg);
    border: 0; border-radius: 9px;
    padding: 9px 10px; margin-top: 6px;
    font: inherit; font-size: 13px; font-weight: 500;
    cursor: pointer; width: 100%;
  }
  .month-add:hover { background: var(--ink-2); }
  .month-add.secondary {
    background: var(--surface-2); color: var(--ink);
    border: 1px solid var(--border);
    margin-top: 4px;
  }
  .month-add.secondary:hover { background: var(--bg-2); }

  /* ─── Data Manager Modal ────────────────────── */
  .dm-backdrop {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(28, 25, 23, 0.55);
    backdrop-filter: blur(4px);
    display: grid; place-items: center;
    padding: 24px;
    animation: dmFade 180ms ease-out;
  }
  @keyframes dmFade { from { opacity: 0; } to { opacity: 1; } }
  .dm-modal {
    background: var(--bg);
    border: 1px solid var(--border-2);
    border-radius: 18px;
    box-shadow: 0 24px 60px -12px rgba(0,0,0,0.4);
    width: min(820px, 100%);
    max-height: calc(100vh - 48px);
    display: flex; flex-direction: column;
    animation: dmRise 220ms cubic-bezier(.3,.8,.4,1);
  }
  @keyframes dmRise { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .dm-head {
    padding: 18px 22px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; justify-content: space-between; gap: 16px;
  }
  .dm-crumb { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .dm-title { margin: 0; font-size: 18px; font-weight: 600; letter-spacing: -0.01em; }
  .dm-close {
    appearance: none; background: var(--surface); border: 1px solid var(--border);
    width: 30px; height: 30px; border-radius: 8px;
    color: var(--ink-2); font-size: 14px; cursor: pointer;
    display: grid; place-items: center;
    flex-shrink: 0;
  }
  .dm-close:hover { background: var(--bg-2); color: var(--ink); }

  .dm-body {
    padding: 18px 22px 22px;
    overflow: auto;
    display: flex; flex-direction: column;
  }
  .dm-lead { margin: 0 0 14px; color: var(--muted); font-size: 13px; }

  .dm-section-title {
    font-size: 12.5px; font-weight: 600; color: var(--ink);
    margin-bottom: 8px;
    display: flex; align-items: baseline; gap: 10px;
    letter-spacing: 0.01em;
  }
  .dm-section-sub { font-size: 11px; color: var(--muted); font-weight: 400; }

  .dm-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 12px; }
  .dm-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px 12px; }
  @media (max-width: 600px) {
    .dm-grid-2, .dm-grid-3 { grid-template-columns: 1fr; }
  }

  .dm-field {
    display: flex; flex-direction: column; gap: 4px;
    --accent: var(--tamarind);
  }
  .dm-field > span {
    font-size: 11.5px; color: var(--muted);
    font-weight: 500;
    display: flex; align-items: baseline; justify-content: space-between; gap: 6px;
  }
  .dm-hint { font-style: normal; font-size: 10px; opacity: 0.7; font-weight: 400; }
  .dm-field select, .dm-field input[type="number"] {
    appearance: none;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    font: inherit; font-size: 13px;
    color: var(--ink);
    transition: border-color 140ms;
  }
  .dm-field select:focus, .dm-field input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 15%, transparent);
  }
  .dm-num-wrap {
    position: relative;
    display: flex; align-items: center;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    transition: border-color 140ms;
  }
  .dm-num-wrap:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 15%, transparent);
  }
  .dm-num-prefix, .dm-num-suffix {
    color: var(--muted); font-size: 12px;
    padding: 0 8px;
    font-family: var(--font-num);
  }
  .dm-num-wrap input {
    appearance: none; border: 0; background: transparent;
    flex: 1; min-width: 0;
    font: inherit; font-family: var(--font-num);
    font-size: 13.5px; padding: 8px 4px 8px 0;
    color: var(--ink);
    text-align: right;
    outline: none;
  }

  .dm-drop {
    border: 1.5px dashed color-mix(in oklab, var(--tamarind) 35%, var(--border-2));
    border-radius: 12px;
    padding: 22px 18px;
    text-align: center;
    cursor: pointer;
    color: var(--ink-2);
    font-size: 13px;
    background: color-mix(in oklab, var(--tamarind) 4%, var(--surface-2));
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    transition: background 140ms, border-color 140ms;
  }
  .dm-drop:hover, .dm-drop.over { background: color-mix(in oklab, var(--tamarind) 10%, var(--surface)); border-color: var(--tamarind); }
  .dm-drop.busy { opacity: 0.6; pointer-events: none; }
  .dm-drop svg { color: var(--tamarind); }
  .dm-drop-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

  .dm-importmsg {
    margin: 10px 0 0;
    padding: 10px 12px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 12px;
    font-family: var(--font-num);
    color: var(--ink-2);
    white-space: pre-wrap;
    max-height: 120px;
    overflow: auto;
  }

  .dm-totalbar {
    margin-top: 10px;
    padding: 10px 12px;
    background: color-mix(in oklab, var(--ink) 4%, var(--surface-2));
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex; justify-content: space-between; align-items: baseline;
    font-size: 12.5px;
  }
  .dm-totalbar > span:first-child { color: var(--muted); font-weight: 500; }
  .dm-total-num { font-family: var(--font-num); font-weight: 600; font-size: 15px; color: var(--ink); }

  .dm-summary-card {
    margin-top: 18px;
    padding: 14px 16px;
    background: linear-gradient(135deg, color-mix(in oklab, var(--tamarind) 7%, var(--surface)), color-mix(in oklab, var(--leaf) 7%, var(--surface)));
    border: 1px solid var(--border-2);
    border-radius: 12px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .dm-sumrow {
    display: flex; justify-content: space-between;
    font-size: 13px;
    font-family: var(--font-num);
  }
  .dm-sumrow > span:first-child { color: var(--muted); font-family: var(--font); }
  .dm-sumrow.profit {
    border-top: 1px solid var(--border-2);
    padding-top: 8px; margin-top: 4px;
    font-size: 14px;
    font-weight: 600;
  }
  .dm-sumrow.profit > span:first-child { color: var(--ink); }

  .dm-warn {
    margin-top: 10px;
    padding: 8px 12px;
    background: color-mix(in oklab, var(--amber) 12%, transparent);
    border: 1px solid color-mix(in oklab, var(--amber) 30%, transparent);
    color: color-mix(in oklab, var(--amber) 70%, var(--ink));
    border-radius: 8px;
    font-size: 12px;
  }

  .dm-foot {
    margin-top: 22px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
    display: flex; gap: 10px; align-items: center;
    flex-wrap: wrap;
  }
  .dm-btn-danger { color: var(--neg); border-color: color-mix(in oklab, var(--neg) 25%, var(--border-2)); }
  .dm-btn-danger:hover { background: color-mix(in oklab, var(--neg) 8%, var(--surface)); }

  .dm-list { display: flex; flex-direction: column; gap: 8px; }
  .dm-listitem {
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: space-between; gap: 14px;
  }
  .dm-listitem.on { border-color: var(--tamarind); background: color-mix(in oklab, var(--tamarind) 5%, var(--surface)); }
  .dm-listname { font-weight: 600; font-size: 14px; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .dm-liststat { font-size: 12px; color: var(--muted); margin-top: 3px; font-family: var(--font-num); }
  .dm-tag {
    font-size: 9.5px; padding: 2px 7px; border-radius: 999px; font-weight: 600;
    background: var(--bg-2); color: var(--muted); letter-spacing: 0.02em;
  }
  .dm-tag.on { background: color-mix(in oklab, var(--tamarind) 18%, transparent); color: var(--tamarind); }

  .dm-iorow { display: flex; gap: 10px; flex-wrap: wrap; }
  .dm-iorow .btn { cursor: pointer; }

  /* ─── Date popover ──────────────────────────── */
  .date-pop {
    position: absolute;
    z-index: 100;
    background: var(--surface);
    border: 1px solid var(--border-2);
    border-radius: 14px;
    box-shadow: var(--shadow-2);
    padding: 14px;
    width: min(560px, 92vw);
    margin-top: 6px;
  }
  .date-presets {
    display: flex; gap: 6px;
    flex-wrap: wrap;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
  }
  .date-presets button {
    appearance: none;
    border: 1px solid var(--border);
    background: var(--surface-2);
    border-radius: 7px;
    padding: 5px 10px;
    font: inherit;
    color: var(--ink-2);
    font-size: 12px;
    cursor: pointer;
  }
  .date-presets button:hover { background: var(--bg-2); border-color: var(--border-2); }
  .date-presets button.on { background: var(--ink); color: var(--bg); border-color: var(--ink); }

  .cal-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
  }
  @media (max-width: 540px) { .cal-grid { grid-template-columns: 1fr; } }
  .cal-head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px;
    font-weight: 500;
    font-size: 13px;
  }
  .cal-head button {
    appearance: none; border: 0; background: transparent;
    color: var(--ink-2); cursor: pointer;
    width: 24px; height: 24px; border-radius: 6px;
    display: grid; place-items: center;
  }
  .cal-head button:hover { background: var(--bg-2); }
  .cal-week {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    font-size: 10px;
    color: var(--faint);

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // Hide the toggle until the host has actually enabled the rail (the
  // __omelette_rail_enabled window message, posted only when the
  // omelette_deck_rail_enabled flag is on for this user). The initial read
  // covers TweaksPanel mounting after the message already arrived; the
  // listener covers the common case of mounting first.
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

function blankMonth(thaiYear, monthIdx) {

  return {
    id,

// ─── Derived totals from a month record ─────────────────────────
function monthTotals(m) {
  const revenue = (m.channels.tiktok || 0) + (m.channels.shopee || 0) + (m.channels.facebook || 0);
  const opex = Object.values(m.expenses || {}).reduce((s, v) => s + (Number(v) || 0), 0);
  const cogs = (m.cogs && m.cogs > 0) ? Math.round(m.cogs) : Math.round(revenue * (m.cogsRate ?? 0.28));
  const profit = revenue - cogs - opex;
  return { revenue, cogs, opex, profit };
}

// Sum Shopee Net Income column
function sumShopeeIncome(wb) {
  const sheet = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(sheet, { defval: 0 });
  // Find numeric columns; "Total Released Amount" / "Net Income" / "ยอดรับสุทธิ" / "Order Income"
  const candidates = ['Total Released Amount', 'Net Income', 'ยอดรับสุทธิ', 'Order Income', 'จำนวนเงินสุทธิ'];
  let key = null, fee = null;
  if (rows.length) {
    for (const k of Object.keys(rows[0])) {
      const lk = k.toLowerCase();
      if (!key && (candidates.some((c) => lk.includes(c.toLowerCase())) || lk.includes('released'))) key = k;
      if (!fee && (lk.includes('commission') || lk.includes('fee') || lk.includes('ค่าธรรมเนียม'))) fee = k;
    }
  }
  let income = 0, fees = 0;
  for (const r of rows) {
    if (key) income += Number(r[key]) || 0;
    if (fee) fees  += Number(r[fee])  || 0;
  }
  return { income: Math.round(income), fees: Math.round(fees), rows: rows.length };
}

// FlowAccount → bucket totals using fuzzy keyword matching
function sumFlowAccount(wb) {
  const sheet = wb.Sheets[wb.SheetNames[0]];
  // Find the row with column headers; usually "หมวด" / "จำนวนเงิน" / "ยอดรวม"
  const all = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
  let headerRow = -1;
  for (let i = 0; i < Math.min(all.length, 30); i++) {
    const flat = (all[i] || []).join('|').toLowerCase();
    if ((flat.includes('หมวด') || flat.includes('รายการ') || flat.includes('ประเภท')) && (flat.includes('จำนวน') || flat.includes('ยอด') || flat.includes('มูลค่า'))) {
      headerRow = i; break;
    }
  }
  const rows = XLSX.utils.sheet_to_json(sheet, { range: Math.max(headerRow, 0), defval: '' });
  const buckets = { ...EMPTY_EXPENSES };

  const map = (txt) => {
    const t = (txt || '').toString();
    if (/ค่าจ้าง|เงินเดือน|ค่าแรง|พนักงาน(?!.*สวัส)/i.test(t)) return 'salary';
    if (/บรรจุภัณฑ์|กล่อง|ถุง|ฉลาก|ลัง/i.test(t)) return 'packaging';
    if (/เคลม|คืนสินค้า|return/i.test(t)) return 'claims';
    if (/ขนส่ง|ค่าส่ง|shipping|delivery|ไปรษณีย/i.test(t)) return 'shipping';
    if (/ตกแต่ง|อุปกรณ์|เครื่องใช้|สำนักงาน|computer|laptop/i.test(t)) return 'equipment';
    if (/บัตรเครดิต|credit card/i.test(t)) return 'cardfee';
    if (/ดอกเบี้ย|ภาษี|tax|interest/i.test(t)) return 'interest';
    if (/ค่าน้ำ|ค่าไฟ|ประปา|water|electric/i.test(t)) return 'utilities';
    if (/ค่าเช่า|rent/i.test(t)) return 'rent';
    if (/สวัสดิการ|อาหาร|welfare/i.test(t)) return 'welfare';
    if (/โทรศัพท์|อินเตอร์เน็ต|อินเทอร์เน็ต|internet|phone/i.test(t)) return 'telecom';
    if (/โฆษณา|ad|marketing|การตลาด/i.test(t)) return 'ads';
    if (/ธรรมเนียม.*tiktok/i.test(t)) return 'fee_tiktok';
    if (/ธรรมเนียม.*shopee/i.test(t)) return 'fee_shopee';
    return 'misc';
  };

  // Find amount / category / doc-number columns
  let amountKey = null, categoryKey = null, docKey = null;
  if (rows.length) {
    for (const k of Object.keys(rows[0])) {
      if (!amountKey && /จำนวน|ยอด|amount|total/i.test(k)) amountKey = k;
      if (!categoryKey && /หมวด|ประเภท|category/i.test(k)) categoryKey = k;
      if (!docKey && /เลขเอกสาร|เลขที่|เอกสาร|document|doc.*no|reference/i.test(k)) docKey = k;
    }
  }

  let count = 0, cogs = 0, cogsRows = 0;
  for (const r of rows) {
    const amt = amountKey ? Number(r[amountKey]) : 0;
    if (!amt || isNaN(amt)) continue;

    const docNo = docKey ? String(r[docKey] || '').trim() : '';
    const category = categoryKey ? String(r[categoryKey] || '').trim() : '';

    // Skip subtotal rows ("ยอดรวม") and grand-total rows (no docNo + no category)
    if (category === 'ยอดรวม') continue;
    if (!docNo && !category) continue;
    // Rule: เลขเอกสารขึ้นต้น "RI" → ต้นทุนสินค้า (COGS)
    const isCogs = /^RI/i.test(docNo);
    if (isCogs) {
      cogs += amt;
      cogsRows++;
      continue;
    }

    // Otherwise → OPEX bucket via category text (or fallback first non-numeric, non-RI cell)
    let cat = category;
    if (!cat) {
      for (const k of Object.keys(r)) {
        const v = r[k];
        if (typeof v === 'string' && v.trim() && !/^\d+$/.test(v.trim()) && !/^RI/i.test(v.trim())) { cat = v; break; }
      }
    }
    const bucket = map(cat);
    buckets[bucket] = (buckets[bucket] || 0) + amt;
    count++;
  }
  Object.keys(buckets).forEach((k) => buckets[k] = Math.round(buckets[k]));
  cogs = Math.round(cogs);
  return { buckets, rows: count, cogs, cogsRows };
}

// Shopee Income Thai format (รายงานรายรับของฉัน)

  const sheet = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
  const findNum = (r) => {
    for (let i = 1; i < r.length; i++) {
      const n = Number(r[i]);
      if (!isNaN(n) && n !== 0) return n;
    }
    return 0;
  };
  let income = 0, fees = 0;
  for (const r of rows) {
    const label = String(r[0] || '').trim();
    if (/^1\.\s*รายได้ทั้งหมด/.test(label)) income = findNum(r);
    if (/^2\.\s*ค่าใช้จ่ายทั้งหมด/.test(label)) fees = Math.abs(findNum(r));

  return { income: Math.round(income), fees: Math.round(fees) };

// Page365 / Facebook orders CSV (UTF-16, tab-separated)
async function readTextFileSmart(file) {
  const ab = await file.arrayBuffer();
  const u8 = new Uint8Array(ab);
  // Detect UTF-16 LE BOM (FF FE)
  if (u8[0] === 0xFF && u8[1] === 0xFE) return new TextDecoder('utf-16le').decode(ab);
  // Detect UTF-16 BE BOM (FE FF)
  if (u8[0] === 0xFE && u8[1] === 0xFF) return new TextDecoder('utf-16be').decode(ab);
  // Default UTF-8 (handles UTF-8 BOM automatically)
  return new TextDecoder('utf-8').decode(ab);
}
function isPage365Orders(text) {
  const firstLine = (text.split('\n')[0] || '');
  return firstLine.includes('Order assign') && firstLine.includes('Profile name') && firstLine.includes('Paid At');
}
function sumPage365Orders(text, ceYear, monthIdx) {
  const lines = text.split('\n');
  if (!lines.length) return { income: 0, count: 0 };
  const headers = lines[0].split('\t').map(h => h.trim());
  const idxPaid = headers.indexOf('Paid Amount');
  const idxPaidAt = headers.indexOf('Paid At');
  if (idxPaid < 0 || idxPaidAt < 0) return { income: 0, count: 0 };
  const monthPrefix = `${ceYear}-${String(monthIdx + 1).padStart(2, '0')}`;
  let total = 0, count = 0;
  for (let i = 1; i < lines.length; i++) {
    const cells = lines[i].split('\t');
    const paidAt = (cells[idxPaidAt] || '').trim();
    const paid = Number(cells[idxPaid]);
    if (paidAt.startsWith(monthPrefix) && !isNaN(paid) && paid > 0) {
      total += paid;
      count++;
    }
  }
  return { income: Math.round(total), count };
}

// TikTok Shop Income Settlement (multi-sheet workbook with Reports summary)
function isTikTokIncome(wb) {
  // Check if this is a TikTok income workbook (has Reports + Order details sheets)
  const names = wb.SheetNames || [];
  if (names.includes('Reports') && names.includes('Order details')) return true;
  // Fallback: check first sheet for TikTok-style headers
  const sheet = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, range: 0, blankrows: false });
  const flat = JSON.stringify(rows.slice(0, 3));
  return flat.includes('Total settlement amount') && flat.includes('Total Revenue');
}
function sumTikTokIncome(wb) {
  // Prefer the Reports summary sheet (period totals)
  const reports = wb.Sheets['Reports'];
  if (reports) {
    const rows = XLSX.utils.sheet_to_json(reports, { header: 1, defval: '' });
    let totalRev = 0, totalSettle = 0;
    for (const r of rows) {
      const labelCells = r.slice(0, 5).filter(x => x !== '' && x != null).map(x => String(x).trim());
      const label = labelCells.join(' ');
      const val = Number(r[5]);
      if (isNaN(val) || val === 0) continue;
      if (/\bTotal Revenue\b/i.test(label) && !/Refund/i.test(label)) totalRev = val;
      else if (/\bTotal settlement amount\b/i.test(label)) totalSettle = val;
    }
    return { income: Math.round(totalRev), fees: Math.round(totalRev - totalSettle), count: 0 };
  }
  // Fallback: sum Order details sheet
  const sheet = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(sheet, { defval: '' });
  if (!rows.length) return { income: 0, fees: 0, count: 0 };
  const keys = Object.keys(rows[0]);
  const revKey = keys.find(k => k.trim() === 'Total Revenue');
  const settleKey = keys.find(k => k.trim() === 'Total settlement amount');
  let income = 0, settle = 0, count = 0;
  for (const r of rows) {
    const rev = revKey ? Number(r[revKey]) || 0 : 0;
    if (rev > 0) { income += rev; settle += settleKey ? Number(r[settleKey]) || 0 : 0; count++; }
  }
  return { income: Math.round(income), fees: Math.round(income - settle), count };
}

// Series + helpers. Now reads from active month record (window.MKW_STORE).

const __S = window.MKW_STORE;

// Deterministic pseudo-random
function mulberry32(seed) {
  return function () {
    let t = seed += 0x6D2B79F5;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

function fmtBaht(n, compact = false) {
  if (n == null || isNaN(n)) return '–';
  const sign = n < 0 ? '-' : '';
  const abs = Math.abs(n);
  if (compact) {
    if (abs >= 1e6) return sign + (abs / 1e6).toFixed(2) + 'M';
    if (abs >= 1e3) return sign + (abs / 1e3).toFixed(abs >= 1e4 ? 0 : 1) + 'K';
    return sign + abs.toLocaleString('en-US');
  }
  return sign + abs.toLocaleString('en-US', { maximumFractionDigits: 0 });
}

function fmtPct(n, digits = 1) {
  if (n == null) return '–';
  const sign = n > 0 ? '+' : '';
  return sign + n.toFixed(digits) + '%';
}

// ─── Real January 2569 daily revenue (from FB actual + scaled) ─────────────
const JAN2569_FB_DAILY = [
  18250,27500,35129,45594,34659,52310,61480,48920,39870,56240,
  63120,71580,49830,58460,67290,75840,82100,69430,78650,88900,
  91230,79540,85670,93480,88100,88245,90040,98699,78550,87582,92400
];

// Generate daily series for any month given totals
function genDaily(month, daysInMonth) {
  const totals = __S.monthTotals(month);
  const rng = mulberry32(month.id ? month.id.split('').reduce((s, c) => s + c.charCodeAt(0), 0) : 33);
  const points = [];
  // Use real Jan 2569 shape if it's that month
  const useRealShape = month.id === '2569-01';
  const shape = useRealShape
    ? JAN2569_FB_DAILY.slice(0, daysInMonth)
    : Array.from({ length: daysInMonth }, (_, i) => {
        const t = i / Math.max(1, daysInMonth - 1);
        const trend = 1 + t * 0.18;
        const wobble = 0.78 + rng() * 0.5 + Math.sin((i / daysInMonth) * Math.PI * 2.2) * 0.12;
        return trend * wobble;
      });
  const shapeSum = shape.reduce((a, b) => a + b, 0) || 1;
  const opexPerDay = Math.round(totals.opex / daysInMonth);
  for (let i = 0; i < daysInMonth; i++) {
    const revenue = Math.round(totals.revenue * (shape[i] / shapeSum));
    const cogs = (month.cogs && month.cogs > 0) ? Math.round(month.cogs * (shape[i] / shapeSum)) : Math.round(revenue * (month.cogsRate ?? 0.28));
    const opex = opexPerDay;
    const profit = revenue - cogs - opex;
    points.push({ label: `${i + 1}`, revenue, cogs, opex, profit });
  }
  return points;
}

function daysInThaiMonth(id) {
  const [ty, mm] = id.split('-').map(Number);
  return new Date(ty - 543, mm, 0).getDate();
}

// ─── Period series generation (month-aware) ──────────────────────────
// genSeries(periodKey, activeMonth, prevMonth?)
function genSeries(periodKey, activeMonth, prevMonth, allMonths) {
  const monthRec = activeMonth || __S.DEFAULT_JAN_2569;
  const totals = __S.monthTotals(monthRec);
  const dim = daysInThaiMonth(monthRec.id);
  const daily = genDaily(monthRec, dim);
  const seriesLabel = monthRec.thaiName + (monthRec.source === 'baked' ? ' (ข้อมูลจริง)' : '');

  // Period-shaped points
  let points = [], pointsLabel = seriesLabel, periodTotals;
  switch (periodKey) {
    case 'day': {
      // 12 points = every 2h, distribute average daily into hours
      const avgDaily = totals.revenue / dim;
      const rng = mulberry32(11);
      points = Array.from({ length: 12 }, (_, i) => {
        const hr = i * 2;
        // Heavy peak around 10:00, 14:00, 20:00
        const peak = 0.6 + Math.exp(-Math.pow(hr - 14, 2) / 30) * 0.9 + Math.exp(-Math.pow(hr - 20, 2) / 12) * 1.1;
        const wobble = 0.85 + rng() * 0.3;
        const revenue = Math.round((avgDaily / 12) * peak * wobble * 1.6);
        const cogs = (monthRec.cogs && monthRec.cogs > 0) ? Math.round(monthRec.cogs * (revenue / Math.max(1, totals.revenue))) : Math.round(revenue * (monthRec.cogsRate ?? 0.28));
        const opex = Math.round(totals.opex / dim / 12);
        return { label: `${String(hr).padStart(2, '0')}:00`, revenue, cogs, opex, profit: revenue - cogs - opex };
      });
      pointsLabel = `วันนี้ใน ${monthRec.thaiName}`;
      break;
    }
    case 'week': {
      // 7 days, distribute roughly 1/4 of month
      const weekRev = totals.revenue / 4;
      const rng = mulberry32(22);
      const wkLabels = ['จ.', 'อ.', 'พ.', 'พฤ.', 'ศ.', 'ส.', 'อา.'];
      points = wkLabels.map((label, i) => {
        const wobble = 0.78 + rng() * 0.5;
        const revenue = Math.round((weekRev / 7) * wobble);
        const cogs = (monthRec.cogs && monthRec.cogs > 0) ? Math.round(monthRec.cogs * (revenue / Math.max(1, totals.revenue))) : Math.round(revenue * (monthRec.cogsRate ?? 0.28));
        const opex = Math.round(totals.opex / dim);
        return { label, revenue, cogs, opex, profit: revenue - cogs - opex };
      });
      pointsLabel = `สัปดาห์นี้ใน ${monthRec.thaiName}`;
      break;
    }
    case 'month': {
      points = daily;
      pointsLabel = seriesLabel;
      break;
    }
    case 'year': {
      // 12 months — show real data for each month from storage; 0 for empty months.
      const labels = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
      const yearStr = monthRec.id.split('-')[0];
      const monthsList = (allMonths && allMonths.length) ? allMonths : __S.loadMonths();
      const byMonth = {};
      for (const m of monthsList) {
        const [y, mm] = m.id.split('-');
        if (y === yearStr) byMonth[Number(mm) - 1] = m;
      }
      points = labels.map((label, i) => {
        const m = byMonth[i];
        if (!m) return { label, revenue: 0, cogs: 0, opex: 0, profit: 0 };
        const t = __S.monthTotals(m);
        return { label, revenue: t.revenue, cogs: t.cogs, opex: t.opex, profit: t.profit };
      });
      pointsLabel = `ปี ${yearStr}`;
      break;
    }
  }

  periodTotals = points.reduce((a, b) => ({
    revenue: a.revenue + b.revenue,
    cogs: a.cogs + b.cogs,
    opex: a.opex + b.opex,
    profit: a.profit + b.profit,
  }), { revenue: 0, cogs: 0, opex: 0, profit: 0 });

  // Previous totals — for delta calculation
  let prev;
  if (prevMonth) {
    const pt = __S.monthTotals(prevMonth);
    if (periodKey === 'month') prev = pt;
    else if (periodKey === 'year') prev = { revenue: pt.revenue * 12, cogs: pt.cogs * 12, opex: pt.opex * 12, profit: pt.profit * 12 };
    else if (periodKey === 'week') prev = { revenue: pt.revenue / 4, cogs: pt.cogs / 4, opex: pt.opex / 4, profit: pt.profit / 4 };
    else prev = { revenue: pt.revenue / 30, cogs: pt.cogs / 30, opex: pt.opex / 30, profit: pt.profit / 30 };
    Object.keys(prev).forEach((k) => prev[k] = Math.round(prev[k]));
  } else if (monthRec.prevRevenue) {
    // estimate using prevRevenue + same opex ratio
    const ratio = monthRec.prevRevenue / Math.max(1, totals.revenue);
    prev = {
      revenue: Math.round(periodTotals.revenue * ratio),
      cogs:    Math.round(periodTotals.cogs * ratio),
      opex:    Math.round(periodTotals.opex * (0.95 + 0.05 * ratio)),
      profit:  0,
    };
    prev.profit = prev.revenue - prev.cogs - prev.opex;
  } else {
    prev = {
      revenue: Math.round(periodTotals.revenue * 0.92),
      cogs:    Math.round(periodTotals.cogs * 0.94),
      opex:    Math.round(periodTotals.opex * 0.96),
      profit:  Math.round(periodTotals.profit * 0.85),
    };
  }

  return {
    points,
    totals: periodTotals,
    prev,
    meta: { seriesLabel: pointsLabel, monthName: monthRec.thaiName },
  };
}

// ─── Derived: channels for active month ───────────────────────────
// Aggregate all months of a given year into one synthetic month-like object
function aggregateYear(months, year) {
  const yearMonths = months.filter(m => m.id.split('-')[0] === year);
  const channels = { tiktok: 0, shopee: 0, facebook: 0 };
  const expenses = {};
  let cogs = 0;
  for (const m of yearMonths) {
    channels.tiktok += m.channels.tiktok || 0;
    channels.shopee += m.channels.shopee || 0;
    channels.facebook += m.channels.facebook || 0;
    cogs += m.cogs || 0;
    for (const k of Object.keys(m.expenses || {})) {
      expenses[k] = (expenses[k] || 0) + (m.expenses[k] || 0);
    }
  }
  return {
    id: `${year}-YR`,
    thaiName: `ปี ${year}`,
    channels, expenses, cogs,
    cogsRate: 0.28, prevRevenue: 0, source: 'aggregate'
  };
}

function channelsFromMonth(month) {
  const m = month || __S.DEFAULT_JAN_2569;
  const total = (m.channels.tiktok || 0) + (m.channels.shopee || 0) + (m.channels.facebook || 0);
  const safe = total || 1;
  return [
    { key: 'tiktok',   name: 'TikTok Shop', short: 'TT', color: 'var(--ink)',      share: m.channels.tiktok / safe,   revenue: m.channels.tiktok || 0,   orders: null, aov: null },
    { key: 'shopee',   name: 'Shopee',      short: 'SP', color: 'var(--honey)',    share: m.channels.shopee / safe,   revenue: m.channels.shopee || 0,   orders: null, aov: null },
    { key: 'facebook', name: 'Facebook',    short: 'FB', color: 'var(--tamarind)', share: m.channels.facebook / safe, revenue: m.channels.facebook || 0, orders: null, aov: null },
  ];
}

// ─── Derived: OPEX breakdown for active month ─────────────────────
function opexFromMonth(month) {
  const m = month || __S.DEFAULT_JAN_2569;
  return __S.EXPENSE_FIELDS
    .map((f) => ({ label: f.label, value: m.expenses[f.k] || 0, color: f.color, key: f.k }))

    .sort((a, b) => b.value - a.value);

// ─── Recent transactions (synthesized from active month) ──────────
function txnsFromMonth(month) {
  const m = month || __S.DEFAULT_JAN_2569;
  const monthEnd = m.id.split('-')[1].padStart(2, '0');
  const monthShort = ['','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'][Number(monthEnd)] || '';
  const dim = daysInThaiMonth(m.id);
  const txns = [];
  if (m.channels.tiktok) {
    txns.push({ id: 'TT-IN', date: `${dim} ${monthShort} 23:59`, desc: 'ยอดโอน TikTok Shop (รวมทุกบัญชี)', channel: 'TikTok', amount: m.channels.tiktok, type: 'in' });
  }
  if (m.channels.shopee) {
    txns.push({ id: 'SP-IN', date: `${dim} ${monthShort} 12:00`, desc: 'ยอดโอน Shopee', channel: 'Shopee', amount: m.channels.shopee, type: 'in' });
  }
  if (m.channels.facebook) {
    txns.push({ id: 'FB-IN', date: `${dim} ${monthShort} 00:00`, desc: 'ยอดขาย Facebook Shop', channel: 'Facebook', amount: m.channels.facebook, type: 'in' });
  }
  if (m.expenses.ads) {
    txns.push({ id: 'ADS', date: `${Math.max(1, dim-2)} ${monthShort} 09:00`, desc: 'ค่าโฆษณาออนไลน์ (TikTok+Facebook)', channel: 'จ่ายออก', amount: -m.expenses.ads, type: 'out' });
  }
  if (m.expenses.fee_tiktok) {
    txns.push({ id: 'TT-FEE', date: `${dim} ${monthShort} 23:59`, desc: 'ค่าธรรมเนียม TikTok Shop', channel: 'จ่ายออก', amount: -m.expenses.fee_tiktok, type: 'out' });
  }
  if (m.expenses.salary) {
    txns.push({ id: 'SAL', date: `25 ${monthShort} 10:00`, desc: 'จ่ายเงินเดือนพนักงาน', channel: 'จ่ายออก', amount: -m.expenses.salary, type: 'out' });
  }
  return txns;
}

// ─── Sparkline (KPI card) ─────────────────────────────
function Sparkline({ data, color = 'var(--tamarind)', width = 86, height = 28 }) {
  if (!data || data.length < 2) return <svg width={width} height={height} />;
  const min = Math.min(...data);
  const max = Math.max(...data);
  const range = Math.max(1, max - min);
  const px = (i) => (i / (data.length - 1)) * (width - 2) + 1;
  const py = (v) => height - 2 - ((v - min) / range) * (height - 4);
  const linePath = data.map((v, i) => `${i === 0 ? 'M' : 'L'}${px(i).toFixed(1)},${py(v).toFixed(1)}`).join(' ');
  const fillPath = linePath + ` L${px(data.length - 1).toFixed(1)},${height} L${px(0).toFixed(1)},${height} Z`;
  return (
    <svg className="kpi-spark" viewBox={`0 0 ${width} ${height}`} width={width} height={height}>
      <path className="fill" d={fillPath} fill={color} />
      <path d={linePath} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
      <circle cx={px(data.length - 1)} cy={py(data[data.length - 1])} r="2.5" fill={color} />
    </svg>
  );
}

// ─── Revenue Area Chart ───────────────────────────────
function RevenueChart({ series, height = 280 }) {
  const containerRef = React.useRef(null);
  const [hover, setHover] = React.useState(null); // {idx, x, y, point}
  const [w, setW] = React.useState(800);

  React.useEffect(() => {
    if (!containerRef.current) return;
    const ro = new ResizeObserver((entries) => {
      for (const e of entries) setW(Math.floor(e.contentRect.width));
    });
    ro.observe(containerRef.current);
    return () => ro.disconnect();
  }, []);

  const padL = 44, padR = 16, padT = 16, padB = 30;
  const innerW = Math.max(1, w - padL - padR);
  const innerH = height - padT - padB;
  const data = series.points;
  const n = data.length;
  if (n < 2) return null;

  const maxRev = Math.max(...data.map((d) => d.revenue));
  const yMax = Math.ceil(maxRev / 5000) * 5000 || 1;
  const px = (i) => padL + (i / (n - 1)) * innerW;
  const py = (v) => padT + innerH - (v / yMax) * innerH;

  // Smooth curve via cubic bezier
  const curve = (vals) => {
    const pts = vals.map((v, i) => [px(i), py(v)]);
    let d = `M${pts[0][0].toFixed(1)},${pts[0][1].toFixed(1)}`;
    for (let i = 0; i < pts.length - 1; i++) {
      const [x0, y0] = pts[i];
      const [x1, y1] = pts[i + 1];
      const cx = (x0 + x1) / 2;
      d += ` C${cx.toFixed(1)},${y0.toFixed(1)} ${cx.toFixed(1)},${y1.toFixed(1)} ${x1.toFixed(1)},${y1.toFixed(1)}`;
    }
    return d;
  };

  const revPath = curve(data.map((d) => d.revenue));
  const profPath = curve(data.map((d) => d.profit));
  const fillPath = revPath + ` L${px(n - 1).toFixed(1)},${(padT + innerH).toFixed(1)} L${px(0).toFixed(1)},${(padT + innerH).toFixed(1)} Z`;

  // Y-axis ticks
  const ticks = 4;
  const tickVals = Array.from({ length: ticks + 1 }, (_, i) => (yMax / ticks) * i);
  // X-axis labels: show all if <=12, else every Nth
  const xStep = n <= 12 ? 1 : Math.ceil(n / 8);

  const onMove = (e) => {
    const rect = containerRef.current.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const rel = (mx - padL) / innerW;
    const idx = Math.max(0, Math.min(n - 1, Math.round(rel * (n - 1))));
    setHover({ idx, x: px(idx), y: py(data[idx].revenue), point: data[idx] });
  };
  const onLeave = () => setHover(null);

  return (
    <div ref={containerRef} style={{ position: 'relative', width: '100%' }}>
      <svg width="100%" height={height} viewBox={`0 0 ${Math.max(w, 1)} ${height}`}
           onMouseMove={onMove} onMouseLeave={onLeave}
           style={{ display: 'block', overflow: 'visible' }}>
        <defs>
          <linearGradient id="rev-grad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="var(--tamarind)" stopOpacity="0.32" />
            <stop offset="100%" stopColor="var(--tamarind)" stopOpacity="0.02" />
          </linearGradient>
        </defs>
        {/* Y gridlines */}
        {tickVals.map((v, i) => (
          <g key={i}>
            <line x1={padL} x2={padL + innerW} y1={py(v)} y2={py(v)}
                  stroke="var(--border)" strokeDasharray={i === 0 ? '0' : '3 4'} />
            <text x={padL - 8} y={py(v)} dy="0.32em" textAnchor="end"
                  fontSize="10.5" fill="var(--faint)" fontFamily="var(--font-num)">
              {v >= 1000 ? (v / 1000).toFixed(0) + 'K' : v}
            </text>
          </g>
        ))}
        {/* X labels */}
        {data.map((d, i) => (
          (i % xStep === 0 || i === n - 1) && (
            <text key={i} x={px(i)} y={height - 8} textAnchor="middle"
                  fontSize="10.5" fill="var(--muted)" fontFamily="var(--font-thai)">
              {d.label}
            </text>
          )
        ))}
        {/* Revenue area */}
        <path d={fillPath} fill="url(#rev-grad)" />
        <path d={revPath} fill="none" stroke="var(--tamarind)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
        {/* Profit line */}
        <path d={profPath} fill="none" stroke="var(--leaf)" strokeWidth="1.6"
              strokeDasharray="4 4" strokeLinecap="round" strokeLinejoin="round" />
        {/* Hover indicator */}
        {hover && (
          <g>
            <line x1={hover.x} x2={hover.x} y1={padT} y2={padT + innerH}
                  stroke="var(--ink)" strokeOpacity="0.18" />
            <circle cx={hover.x} cy={py(hover.point.revenue)} r="4.5" fill="var(--surface)" stroke="var(--tamarind)" strokeWidth="2" />
            <circle cx={hover.x} cy={py(hover.point.profit)} r="3.5" fill="var(--surface)" stroke="var(--leaf)" strokeWidth="2" />
          </g>
        )}
      </svg>
      {hover && (
        <div className="ttip on" style={{
          left: Math.min(Math.max(hover.x - 70, 8), w - 140),
          top: Math.max(py(hover.point.revenue) - 70, 4),
        }}>
          <div className="l">{hover.point.label}</div>
          <div className="v" style={{ color: 'var(--honey)' }}>รายได้ ฿{fmtBaht(hover.point.revenue)}</div>
          <div className="v" style={{ color: 'var(--leaf)' }}>กำไร ฿{fmtBaht(hover.point.profit)}</div>
        </div>
      )}
    </div>
  );
}

// ─── Donut chart for channels ─────────────────────────
function ChannelDonut({ channels, size = 200, total }) {
  const cx = size / 2, cy = size / 2;
  const r = size / 2 - 12;
  const ir = r - 22;
  let cum = 0;
  const segs = channels.map((ch, i) => {
    const start = cum;
    cum += ch.share;
    const end = cum;
    const a0 = start * 2 * Math.PI - Math.PI / 2;
    const a1 = end * 2 * Math.PI - Math.PI / 2;
    const large = (a1 - a0) > Math.PI ? 1 : 0;
    const x0 = cx + r * Math.cos(a0), y0 = cy + r * Math.sin(a0);
    const x1 = cx + r * Math.cos(a1), y1 = cy + r * Math.sin(a1);
    const x0i = cx + ir * Math.cos(a0), y0i = cy + ir * Math.sin(a0);
    const x1i = cx + ir * Math.cos(a1), y1i = cy + ir * Math.sin(a1);
    const path = [
      `M${x0.toFixed(2)},${y0.toFixed(2)}`,
      `A${r},${r} 0 ${large} 1 ${x1.toFixed(2)},${y1.toFixed(2)}`,
      `L${x1i.toFixed(2)},${y1i.toFixed(2)}`,
      `A${ir},${ir} 0 ${large} 0 ${x0i.toFixed(2)},${y0i.toFixed(2)}`,
      'Z',
    ].join(' ');
    return { ...ch, path };
  });
  return (
    <div className="donut-wrap">
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        {segs.map((s, i) => (
          <path key={s.key} d={s.path} fill={s.color}
                style={{ transition: 'opacity 200ms', cursor: 'pointer' }} />
        ))}
        {/* Subtle inner ring outline */}
        <circle cx={cx} cy={cy} r={ir} fill="var(--surface)" />
      </svg>
      <div className="donut-center">
        <div className="v">฿{fmtBaht(total, true)}</div>
        <div className="l">ยอดขายรวม</div>
      </div>
    </div>
  );
}

      const now = new Date();

      setYear(ty);
      setMonthIdx(now.getMonth());
      setDraft(S.blankMonth(ty, now.getMonth()));

  const updField = (path, val) => {
    setDraft((d) => {
      const next = JSON.parse(JSON.stringify(d));

      let obj = next;
      for (let i = 0; i < keys.length - 1; i++) obj = obj[keys[i]];
      obj[keys[keys.length - 1]] = val;
      return next;
    });
  };

  const onPickFiles = async (filesList) => {
    const files = Array.from(filesList || []);
    if (!files.length) return;
    setBusy(true);
    setImportMsg(null);
    const log = [];
    const next = JSON.parse(JSON.stringify(draft));
    let totalShopee = 0, shopeeFee = 0, totalTiktok = 0, tiktokFee = 0, totalFacebook = 0;
    const ceYear = year - 543;
    for (const f of files) {
      try {
        // CSV (Page365 / Facebook orders) — read as text, may be UTF-16
        if (/\.csv$/i.test(f.name)) {

            log.push(`✅ ${f.name} → Facebook (฿${income.toLocaleString()}, ${count} ออเดอร์)`);
          } else {
            log.push(`⚠️ ${f.name} → CSV ไม่รู้จักรูปแบบ ข้าม`);
          }
          continue;
        }
        const wb = await S.parseExcelFile(f);
        if (S.isShopeeIncomeTH(wb)) {
          const { income, fees } = S.sumShopeeIncomeTH(wb);
          totalShopee += income;
          shopeeFee += fees;
          log.push(`✅ ${f.name} → Shopee (฿${income.toLocaleString()})`);
        } else if (S.isShopeeIncome(wb)) {
          const { income, fees, rows } = S.sumShopeeIncome(wb);
          totalShopee += income;
          shopeeFee += fees;
          log.push(`✅ ${f.name} → Shopee (฿${income.toLocaleString()}, ${rows} ออเดอร์)`);
        } else if (S.isTikTokIncome(wb)) {
          const { income, fees, count } = S.sumTikTokIncome(wb);
          totalTiktok += income;
          tiktokFee += fees;
          log.push(`✅ ${f.name} → TikTok (฿${income.toLocaleString()}, ${count} ออเดอร์)`);
        } else if (S.isFlowAccount(wb)) {
          const { buckets, rows, cogs: faCogs, cogsRows } = S.sumFlowAccount(wb);
          for (const k of Object.keys(buckets)) {
            if (buckets[k] > 0) next.expenses[k] = (next.expenses[k] || 0) + buckets[k];
          }
          if (faCogs > 0) next.cogs = (next.cogs || 0) + faCogs;
          log.push(`✅ ${f.name} → FlowAccount (${rows} หมวด opex, ${cogsRows} แถว COGS = ฿${faCogs.toLocaleString()})`);
        } else {
          log.push(`⚠️ ${f.name} → ไม่รู้จักรูปแบบ ข้าม`);
        }
      } catch (e) {
        log.push(`❌ ${f.name} → ${e.message}`);
      }
    }
    if (totalShopee > 0) {
      next.channels.shopee = (next.channels.shopee || 0) + totalShopee;
      if (shopeeFee > 0) next.expenses.fee_shopee = (next.expenses.fee_shopee || 0) + shopeeFee;
    }
    if (totalTiktok > 0) {
      next.channels.tiktok = (next.channels.tiktok || 0) + totalTiktok;
      if (tiktokFee > 0) next.expenses.fee_tiktok = (next.expenses.fee_tiktok || 0) + tiktokFee;
    }
    if (totalFacebook > 0) {
      next.channels.facebook = (next.channels.facebook || 0) + totalFacebook;
    }
    setDraft(next);
    setImportMsg(log.join('\n'));
    setBusy(false);
  };

  const handleSave = () => {
    const id = `${year}-${String(monthIdx + 1).padStart(2, '0')}`;
    const finalRecord = {
      ...draft,
      id,
      thaiName: `${S.THAI_MONTHS[monthIdx]} ${year}`,

              onDragLeave={(e) => e.currentTarget.classList.remove('over')}
              onDrop={(e) => {
                e.preventDefault();
                e.currentTarget.classList.remove('over');
                // Collect entries/files synchronously before any async work
                const entries = [];
                const plainFiles = [];
                console.log('DROP items:', e.dataTransfer.items?.length, 'files:', e.dataTransfer.files?.length);
                if (e.dataTransfer.items && e.dataTransfer.items.length) {
                  for (const item of Array.from(e.dataTransfer.items)) {
                    const entry = item.webkitGetAsEntry ? item.webkitGetAsEntry() : null;
                    console.log('item kind:', item.kind, 'entry:', entry ? entry.name + ' isDir=' + entry.isDirectory : 'null');
                    if (entry) entries.push(entry);
                    else { const f2 = item.getAsFile(); if (f2 && /\.(xlsx?|csv)$/i.test(f2.name)) plainFiles.push(f2); }
                  }
                } else {
                  for (const f2 of Array.from(e.dataTransfer.files || [])) plainFiles.push(f2);
                }
                console.log('entries:', entries.length, 'plainFiles:', plainFiles.length);
                // Now process asynchronously
                (async () => {
                  const files = [...plainFiles];
                  const readEntry = async (entry) => {
                    if (entry.isFile && /\.(xlsx?|csv)$/i.test(entry.name)) {
                      files.push(await new Promise((res, rej) => entry.file(res, rej)));
                    } else if (entry.isDirectory) {
                      const reader = entry.createReader();
                      const ents = await new Promise((res, rej) => reader.readEntries(res, rej));
                      for (const e2 of ents) await readEntry(e2);
                    }
                  };
                  for (const entry of entries) await readEntry(entry);

                })();

                อัปโหลดไฟล์ JSON

              </button>

            <div className="dm-foot">

              <button className="btn btn-primary" onClick={onClose}>เสร็จ</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function NumField({ label, hint, value, onChange, accent, suffix, decimals }) {
  const [focused, setFocused] = React.useState(false);
  const display = focused
    ? (value === 0 ? '' : String(value))
    : (value ? Number(value).toLocaleString('en-US', { maximumFractionDigits: decimals ? 2 : 0 }) : '');
  return (
    <label className="dm-field" style={{ '--accent': accent }}>
      <span>{label}{hint && <em className="dm-hint">{hint}</em>}</span>
      <div className="dm-num-wrap">
        {!suffix && <span className="dm-num-prefix">฿</span>}
        <input
          type="text"
          inputMode="decimal"
          value={display}
          placeholder="0"
          onFocus={() => setFocused(true)}
          onBlur={() => setFocused(false)}
          onChange={(e) => {
            const raw = e.target.value.replace(/[^\d.]/g, '');
            onChange(raw === '' ? 0 : Number(raw));
          }}
        />
        {suffix && <span className="dm-num-suffix">{suffix}</span>}
      </div>
    </label>
  );
}

function fmtSyncTime(d) {

  return `วันนี้ ${hh}:${mm} น.`;
}

const LIVE_SHEET_HTMLVIEW = 'https://docs.google.com/spreadsheets/d/' + LIVE_SHEET_ID + '/htmlview';
const LIVE_SHEET_FALLBACK_TABS = [
  { gid: '0', name: 'พ.ค 2569' },
  { gid: '2103092807', name: ' ย้อนหลัง พ.ค 2569' }
];

async function discoverLiveSheets() {
  try {
    const res = await fetch(LIVE_SHEET_HTMLVIEW + '?_t=' + Date.now());
    if (!res.ok) throw new Error('htmlview ' + res.status);
    const html = await res.text();
    const tabs = [];
    const seen = new Set();
    const re = /items\.push\(\{name:\s*"([^"]*)"[^}]*?gid:\s*"(-?\d+)"/g;
    let m;
    while ((m = re.exec(html)) !== null) {
      const name = m[1].trim() || ('Sheet ' + m[2]);
      const gid = m[2];
      if (seen.has(gid)) continue;
      seen.add(gid);
      tabs.push({ gid, name });
    }
    if (!tabs.length) return LIVE_SHEET_FALLBACK_TABS;
    return tabs;
  } catch (e) {
    return LIVE_SHEET_FALLBACK_TABS;
  }
}
const THAI_MON_ABBR = { 'ม.ค.': 0, 'ก.พ.': 1, 'มี.ค.': 2, 'เม.ย.': 3, 'พ.ค.': 4, 'มิ.ย.': 5, 'ก.ค.': 6, 'ส.ค.': 7, 'ก.ย.': 8, 'ต.ค.': 9, 'พ.ย.': 10, 'ธ.ค.': 11 };

function parseStockDate(s) {
  if (!s) return null;
  const m = String(s).match(/(\d+)\/(.+?)\/(\d{4})/);
  if (!m) return null;
  const mon = THAI_MON_ABBR[m[2]];
  if (mon == null) return null;
  return new Date(Number(m[3]), mon, Number(m[1]));
}

function parseCSV(text) {
  const rows = [];
  let i = 0, cur = '', row = [], inQ = false;
  while (i < text.length) {
    const c = text[i];
    if (inQ) {
      if (c === '"' && text[i+1] === '"') { cur += '"'; i += 2; continue; }
      if (c === '"') { inQ = false; i++; continue; }
      cur += c; i++;
    } else {
      if (c === '"') { inQ = true; i++; continue; }
      if (c === ',') { row.push(cur); cur = ''; i++; continue; }
      if (c === '\n') { row.push(cur); rows.push(row); cur = ''; row = []; i++; continue; }
      if (c === '\r') { i++; continue; }
      cur += c; i++;
    }
  }
  if (cur || row.length) { row.push(cur); rows.push(row); }
  return rows;
}

function num(v) {
  if (v == null || v === '') return 0;
  const n = Number(String(v).replace(/,/g, ''));
  return isNaN(n) ? 0 : n;
}

function ymd(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + day;
}

// ─── Identity session (10 hours) ─────────────────────────
const CURRENT_USER_KEY = 'mkw_current_user';
const SESSION_TTL_MS = 10 * 60 * 60 * 1000;

function getCurrentUser() {
  try {
    const raw = localStorage.getItem(CURRENT_USER_KEY);
    if (!raw) return null;
    const u = JSON.parse(raw);
    if (!u || !u.expiresAt || Date.now() > u.expiresAt) {
      localStorage.removeItem(CURRENT_USER_KEY);
      return null;
    }
    return u;
  } catch (e) { return null; }
}

function setCurrentUserSession(emp) {
  const u = {
    empId: emp.id,
    name: emp.name,
    position: emp.position || '',
    permissions: emp.permissions || { admin: false, finance: false, stock: false, live: false },
    expiresAt: Date.now() + SESSION_TTL_MS
  };
  localStorage.setItem(CURRENT_USER_KEY, JSON.stringify(u));
  window.dispatchEvent(new CustomEvent('mkw-user-change'));
  return u;
}

function logoutCurrentUser() {
  localStorage.removeItem(CURRENT_USER_KEY);
  window.dispatchEvent(new CustomEvent('mkw-user-change'));
}

function useCurrentUser() {
  const [u, setU] = React.useState(() => getCurrentUser());
  React.useEffect(() => {
    const refresh = () => setU(getCurrentUser());
    window.addEventListener('mkw-user-change', refresh);
    window.addEventListener('storage', refresh);
    const id = setInterval(refresh, 60000);
    return () => {
      window.removeEventListener('mkw-user-change', refresh);
      window.removeEventListener('storage', refresh);
      clearInterval(id);
    };
  }, []);
  return u;
}

function hasPerm(user, perm) {
  if (!user || !user.permissions) return false;
  if (user.permissions.owner) return true;
  return !!user.permissions[perm];
}
