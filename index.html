function FaceLoginPanel({ employees, modelsReady, onLoggedIn, onCancel }) {
  const [busy, setBusy] = React.useState(false);
  const [msg, setMsg] = React.useState(null);
  const videoRef = React.useRef(null);
  const scan = async () => {
    if (!modelsReady) { setMsg('กำลังโหลดระบบ รอสักครู่...'); return; }
    if (!videoRef.current) { setMsg('ยังไม่ได้เปิดกล้อง'); return; }
    setBusy(true); setMsg('กำลังสแกน...');
    const c = await captureDescriptor(videoRef.current);
    if (!c) { setMsg('ไม่พบใบหน้า — ลองอีกครั้ง'); setBusy(false); return; }
    const best = matchBest(c.descriptor, employees);
    if (!best || best.distance > FACE_MATCH_THRESHOLD) { setMsg('ไม่พบในระบบ'); setBusy(false); return; }
    if (best.margin < FACE_MARGIN_MIN) { setMsg('⚠️ หน้าใกล้เคียงหลายคน — ลองสแกนใหม่อีกครั้ง'); setBusy(false); return; }
    setCurrentUserSession(best.emp);
    setMsg('✓ สวัสดี ' + best.emp.name);
    setTimeout(() => { onLoggedIn && onLoggedIn(best.emp); }, 1000);
  };
  return (
    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(320px, 1fr))', gap: 16, maxWidth: 900, margin: '0 auto' }}>
      <div className="card" style={{ padding: 20 }}>
        <CameraView onReady={(v) => { videoRef.current = v; }} />
      </div>
      <div className="card" style={{ padding: 14, display: 'flex', flexDirection: 'column', gap: 10, justifyContent: 'center' }}>
        <h3 style={{ margin: 0, color: '#064e3b' }}>🔓 เข้าระบบด้วยใบหน้า</h3>
        <div style={{ color: 'var(--muted)', fontSize: 14 }}>หันหน้าเข้ากล้องแล้วกดสแกน — session จะ active 10 ชั่วโมง</div>
        <button onClick={scan} disabled={busy} style={{ padding: '20px', fontSize: 22, fontWeight: 700, borderRadius: 14, border: 'none', background: 'linear-gradient(135deg, #0ea5e9, #2563eb)', color: '#fff', cursor: busy ? 'wait' : 'pointer', boxShadow: '0 6px 20px rgba(14,165,233,0.3)' }}>
          {busy ? '⏳ กำลังสแกน...' : '👁 สแกนหน้า เข้าระบบ'}
        </button>
        {msg && <div style={{ padding: 14, borderRadius: 10, fontSize: 16, fontWeight: 600, textAlign: 'center', background: msg.startsWith('✓') ? '#d1fae5' : '#fef3c7', color: msg.startsWith('✓') ? '#065f46' : '#92400e' }}>{msg}</div>}
        <button onClick={onCancel} style={{ padding: '10px', borderRadius: 8, border: '1px solid var(--border)', background: 'transparent', cursor: 'pointer', fontSize: 13, color: 'var(--muted)' }}>← ยกเลิก</button>
      </div>
    </div>
  );
}

// ─── เข้าระบบด้วย PIN (ทางสำรองเผื่อกล้องใช้ไม่ได้) ───
function PinLoginPanel({ employees, onLoggedIn, onCancel }) {
  const [empId, setEmpId] = React.useState('');
  const [pin, setPin] = React.useState('');
  const [busy, setBusy] = React.useState(false);
  const [msg, setMsg] = React.useState(null);
  const sorted = [...(employees || [])].sort((a, b) => String(a.name || '').localeCompare(String(b.name || ''), 'th'));
  const submit = async () => {
    if (!empId) { setMsg({ t: 'err', m: 'เลือกชื่อของคุณก่อน' }); return; }
    if (!/^\d{4,8}$/.test(pin)) { setMsg({ t: 'err', m: 'PIN ต้องเป็นตัวเลข 4-8 หลัก' }); return; }
    setBusy(true); setMsg({ t: 'info', m: 'กำลังตรวจสอบ...' });
    try {
      const r = await claimsApi({ action: 'verify_pin', empId, pin });
      if (r.ok) {
        const emp = (employees || []).find((e) => String(e.id) === String(empId));
        if (!emp) { setMsg({ t: 'err', m: 'ไม่พบข้อมูลพนักงาน' }); setBusy(false); return; }
        setCurrentUserSession(emp);
        setMsg({ t: 'ok', m: '✓ สวัสดี ' + (emp.name || '') });
        setTimeout(() => { onLoggedIn && onLoggedIn(emp); }, 800);
      } else if (r.noPin) {
        setMsg({ t: 'err', m: 'คนนี้ยังไม่ได้ตั้ง PIN — กรุณาเข้าด้วยใบหน้าก่อน แล้วตั้ง PIN ไว้ใช้ครั้งต่อไป' });
        setBusy(false);
      } else {
        setMsg({ t: 'err', m: r.error || 'PIN ไม่ถูกต้อง' });
        setBusy(false);
      }
    } catch (e) { setMsg({ t: 'err', m: 'เชื่อมต่อไม่ได้: ' + e.message }); setBusy(false); }
  };
  return (
    <div style={{ maxWidth: 420, margin: '0 auto', display: 'flex', flexDirection: 'column', gap: 14 }}>
      <div className="card" style={{ padding: 20, display: 'flex', flexDirection: 'column', gap: 14 }}>
        <div style={{ textAlign: 'center' }}>
          <div style={{ fontSize: 40 }}>🔢</div>
          <h3 style={{ margin: '4px 0 0', color: '#064e3b' }}>เข้าระบบด้วย PIN</h3>
          <div style={{ color: 'var(--muted)', fontSize: 13, marginTop: 4 }}>ใช้เมื่อกล้องสแกนหน้าใช้ไม่ได้</div>
        </div>
        <label>
          <span style={fLbl}>ชื่อของคุณ</span>
          <select value={empId} onChange={(e) => setEmpId(e.target.value)} style={fInp}>
            <option value="">— เลือกชื่อ —</option>
            {sorted.map((e) => <option key={e.id} value={e.id}>{e.name}</option>)}
          </select>
        </label>
        <label>
          <span style={fLbl}>PIN (ตัวเลข 4-8 หลัก)</span>
          <input type="password" inputMode="numeric" autoComplete="off" value={pin}
            onChange={(e) => setPin(e.target.value.replace(/\D/g, '').slice(0, 8))}
            onKeyDown={(e) => { if (e.key === 'Enter') submit(); }}
            placeholder="••••••" style={{ ...fInp, fontSize: 20, letterSpacing: 6, textAlign: 'center' }} />
        </label>
        <button onClick={submit} disabled={busy} style={{ padding: '16px', fontSize: 18, fontWeight: 700, borderRadius: 12, border: 'none', background: 'linear-gradient(135deg, #0ea5e9, #2563eb)', color: '#fff', cursor: busy ? 'wait' : 'pointer' }}>
          {busy ? '⏳ กำลังตรวจสอบ...' : '🔓 เข้าระบบ'}
        </button>
        {msg && <div style={{ padding: 12, borderRadius: 10, fontSize: 14, fontWeight: 600, textAlign: 'center', background: msg.t === 'ok' ? '#d1fae5' : msg.t === 'info' ? '#dbeafe' : '#fef3c7', color: msg.t === 'ok' ? '#065f46' : msg.t === 'info' ? '#1e40af' : '#92400e' }}>{msg.m}</div>}
        <button onClick={onCancel} style={{ padding: '9px', borderRadius: 8, border: '1px solid var(--border)', background: 'transparent', cursor: 'pointer', fontSize: 13, color: 'var(--muted)' }}>← ยกเลิก</button>
      </div>
    </div>
  );
}

function PinSetupModal({ open, currentUser, onClose }) {

  const [adminKey, setAdminKey] = React.useState(() => { try { return localStorage.getItem('mkw_admin_key') || ''; } catch (e) { return ''; } });

    claimsApi({ action: 'pin_status' })
      .then((r) => { setHasPin(!!(r.hasPin && r.hasPin[String(currentUser.empId)])); })
      .catch(() => setHasPin(false));
    if (currentUser.permissions && (currentUser.permissions.owner || currentUser.permissions.admin)) {
      apiGet('list_employees').then((r) => setEmpList(r.employees || [])).catch(() => {});
    }
  }, [open, currentUser]);
  const doReset = async () => {
    if (!resetEmpId) { setResetMsg({ t: 'err', m: 'เลือกพนักงานที่ลืม PIN ก่อน' }); return; }
    if (!adminKey) { setResetMsg({ t: 'err', m: 'ใส่รหัส Admin' }); return; }
    setResetBusy(true); setResetMsg({ t: 'info', m: 'กำลังรีเซ็ต...' });
    try {
      const r = await claimsApi({ action: 'reset_pin', empId: resetEmpId, adminKey: adminKey });

        try { localStorage.setItem('mkw_admin_key', adminKey); } catch (e) {}
        const nm = (empList.find((e) => String(e.id) === String(resetEmpId)) || {}).name || '';
        setResetMsg({ t: 'ok', m: '✓ รีเซ็ต PIN ของ ' + nm + ' แล้ว — ให้เขาเข้าด้วยใบหน้าแล้วตั้ง PIN ใหม่ได้เลย' });
        setResetEmpId('');
      } else { setResetMsg({ t: 'err', m: r.error || 'ผิดพลาด' }); }
    } catch (e) { setResetMsg({ t: 'err', m: 'เชื่อมต่อไม่ได้: ' + e.message }); }
    setResetBusy(false);
  };
  if (!open || !currentUser) return null;
  const save = async () => {
    if (!/^\d{4,8}$/.test(pin)) { setMsg({ t: 'err', m: 'PIN ต้องเป็นตัวเลข 4-8 หลัก' }); return; }
    if (pin !== pin2) { setMsg({ t: 'err', m: 'PIN ทั้งสองช่องไม่ตรงกัน' }); return; }
    if (hasPin && !/^\d{4,8}$/.test(oldPin)) { setMsg({ t: 'err', m: 'กรุณาใส่ PIN เดิม' }); return; }
    setBusy(true); setMsg({ t: 'info', m: 'กำลังบันทึก...' });
    try {
      const body = { action: 'set_pin', empId: currentUser.empId, name: currentUser.name, pin };
      if (hasPin) body.oldPin = oldPin;
      const r = await claimsApi(body);
      if (r.ok) { setMsg({ t: 'ok', m: '✓ ตั้ง PIN เรียบร้อย! ใช้เข้าระบบได้เลย' }); setTimeout(() => onClose && onClose(), 1100); }
      else { setMsg({ t: 'err', m: r.error || 'ผิดพลาด' }); setBusy(false); }
    } catch (e) { setMsg({ t: 'err', m: 'เชื่อมต่อไม่ได้: ' + e.message }); setBusy(false); }
  };
  return (
    <div onClick={onClose} style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.55)', zIndex: 10000, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 16 }}>
      <div onClick={(e) => e.stopPropagation()} style={{ background: 'var(--surface, #fff)', borderRadius: 16, padding: 22, maxWidth: 400, width: '100%', boxShadow: '0 20px 60px rgba(0,0,0,0.3)' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 }}>
          <h2 style={{ margin: 0, fontSize: 18, color: 'var(--ink)' }}>🔑 {hasPin ? 'เปลี่ยน PIN' : 'ตั้ง PIN'}</h2>
          <button onClick={onClose} style={{ border: 'none', background: 'transparent', fontSize: 22, cursor: 'pointer', color: 'var(--muted)' }}>✕</button>
        </div>
        <div style={{ color: 'var(--muted)', fontSize: 13, marginBottom: 14 }}>{currentUser.name} · ตั้ง PIN ไว้เข้าระบบเผื่อกล้องใช้ไม่ได้</div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
          {hasPin && (
            <label><span style={fLbl}>PIN เดิม</span>
              <input type="password" inputMode="numeric" value={oldPin} onChange={(e) => setOldPin(e.target.value.replace(/\D/g, '').slice(0, 8))} placeholder="••••••" style={{ ...fInp, textAlign: 'center', letterSpacing: 6 }} /></label>
          )}
          <label><span style={fLbl}>{hasPin ? 'PIN ใหม่' : 'ตั้ง PIN'} (ตัวเลข 4-8 หลัก)</span>
            <input type="password" inputMode="numeric" value={pin} onChange={(e) => setPin(e.target.value.replace(/\D/g, '').slice(0, 8))} placeholder="••••••" style={{ ...fInp, textAlign: 'center', letterSpacing: 6 }} /></label>
          <label><span style={fLbl}>ยืนยัน PIN อีกครั้ง</span>
            <input type="password" inputMode="numeric" value={pin2} onChange={(e) => setPin2(e.target.value.replace(/\D/g, '').slice(0, 8))} onKeyDown={(e) => { if (e.key === 'Enter') save(); }} placeholder="••••••" style={{ ...fInp, textAlign: 'center', letterSpacing: 6 }} /></label>
          <button onClick={save} disabled={busy || hasPin === null} style={{ padding: '14px', fontSize: 16, fontWeight: 700, borderRadius: 10, border: 'none', background: '#10b981', color: '#fff', cursor: busy ? 'wait' : 'pointer' }}>
            {busy ? '⏳ กำลังบันทึก...' : '💾 บันทึก PIN'}
          </button>
          {msg && <div style={{ padding: 12, borderRadius: 10, fontSize: 14, fontWeight: 600, textAlign: 'center', background: msg.t === 'ok' ? '#d1fae5' : msg.t === 'info' ? '#dbeafe' : '#fef3c7', color: msg.t === 'ok' ? '#065f46' : msg.t === 'info' ? '#1e40af' : '#92400e' }}>{msg.m}</div>}
        </div>
        {isAdmin && (
          <div style={{ marginTop: 18, paddingTop: 16, borderTop: '1px dashed var(--border)' }}>
            <div style={{ fontWeight: 700, color: 'var(--ink)', fontSize: 15, marginBottom: 2 }}>🛡 รีเซ็ต PIN พนักงาน (Admin)</div>
            <div style={{ color: 'var(--muted)', fontSize: 12.5, marginBottom: 12 }}>ใช้เมื่อพนักงานลืม PIN — ลบ PIN เก่าให้เขาตั้งใหม่</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
              <select value={resetEmpId} onChange={(e) => setResetEmpId(e.target.value)} style={fInp}>
                <option value="">— เลือกพนักงาน —</option>
                {[...empList].sort((a, b) => String(a.name || '').localeCompare(String(b.name || ''), 'th')).map((e) => <option key={e.id} value={e.id}>{e.name}</option>)}
              </select>
              <input type="password" value={adminKey} onChange={(e) => setAdminKey(e.target.value)} placeholder="รหัส Admin" style={fInp} />
              <button onClick={doReset} disabled={resetBusy} style={{ padding: '12px', fontSize: 15, fontWeight: 700, borderRadius: 10, border: 'none', background: '#ef4444', color: '#fff', cursor: resetBusy ? 'wait' : 'pointer' }}>
                {resetBusy ? '⏳ กำลังรีเซ็ต...' : '🗑 รีเซ็ต PIN'}
              </button>
              {resetMsg && <div style={{ padding: 11, borderRadius: 10, fontSize: 13.5, fontWeight: 600, textAlign: 'center', background: resetMsg.t === 'ok' ? '#d1fae5' : resetMsg.t === 'info' ? '#dbeafe' : '#fef3c7', color: resetMsg.t === 'ok' ? '#065f46' : resetMsg.t === 'info' ? '#1e40af' : '#92400e' }}>{resetMsg.m}</div>}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function PermissionsManager({ employees, onChanged, onClose }) {
  const [pending, setPending] = React.useState([]);
  const [busy, setBusy] = React.useState(null);
  const [overrides, setOverrides] = React.useState({});
  const [savingMap, setSavingMap] = React.useState({});
  const loadPending = React.useCallback(async () => {
    const r = await apiGet('list_pending');
    setPending(r.pending || []);
  }, []);
  React.useEffect(() => { loadPending(); }, [loadPending]);

  const updatePerm = (emp, key, value) => {
    const base = overrides[emp.id] || emp.permissions || {};
    const newPerms = { ...base, [key]: value };
    delete newPerms.owner;
    setOverrides(o => ({ ...o, [emp.id]: newPerms }));
    setSavingMap(m => ({ ...m, [emp.id + ':' + key]: true }));
    (async () => {
      try {
        const r = await apiPost('set_permissions', { empId: emp.id, permissions: newPerms });
        if (r && r.error) {
          alert('ผิดพลาด: ' + r.error);
          setOverrides(o => {
            const copy = { ...o };
            const cur = { ...(copy[emp.id] || emp.permissions || {}) };
            cur[key] = !value;
            copy[emp.id] = cur;
            return copy;
          });
        }
      } catch (e) {
        alert('เชื่อมต่อ API ไม่สำเร็จ: ' + (e.message || e));
        setOverrides(o => {
          const copy = { ...o };
          const cur = { ...(copy[emp.id] || emp.permissions || {}) };
          cur[key] = !value;
          copy[emp.id] = cur;
          return copy;
        });
      } finally {
        setSavingMap(m => { const c = { ...m }; delete c[emp.id + ':' + key]; return c; });
      }
    })();
  };

  const approveReq = async (req) => {
    const url = ATTENDANCE_API + '?action=approve&req=' + encodeURIComponent(req.reqId) + '&token=' + req.token;
    setBusy(req.reqId);
    try { await fetch(url); } catch (e) {}
    setBusy(null);
    await loadPending(); onChanged && onChanged();
  };
  const rejectReq = async (req) => {
    if (!confirm('ปฏิเสธคำขอจาก ' + req.name + '?')) return;
    const url = ATTENDANCE_API + '?action=reject&req=' + encodeURIComponent(req.reqId) + '&token=' + req.token;
    setBusy(req.reqId);
    try { await fetch(url); } catch (e) {}
    setBusy(null);
    await loadPending();
  };

  return (
    <div style={{ display: 'grid', gap: 16 }}>
      <div className="card" style={{ padding: 20 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14 }}>
          <h3 style={{ margin: 0, color: '#7c2d12' }}>📨 คำขอรอดำเนินการ ({pending.length})</h3>
          <button onClick={onClose} style={{ padding: '6px 12px', borderRadius: 6, border: '1px solid var(--border)', background: 'transparent', cursor: 'pointer' }}>← กลับ</button>
        </div>
        {pending.length === 0 ? (
          <div style={{ color: 'var(--muted)', padding: 20, textAlign: 'center' }}>ไม่มีคำขอใหม่</div>
        ) : (
          <div style={{ display: 'grid', gap: 10 }}>
            {pending.map(req => (
              <div key={req.reqId} style={{ padding: 14, border: '1px solid #fbbf24', borderRadius: 10, background: '#fffbeb', display: 'flex', alignItems: 'center', gap: 12, flexWrap: 'wrap' }}>
                <div style={{ flex: 1, minWidth: 200 }}>
                  <div style={{ fontWeight: 600, fontSize: 15 }}>{req.name} <span style={{ color: 'var(--muted)', fontSize: 11 }}>({req.empId})</span></div>
                  <div style={{ fontSize: 13, color: 'var(--muted)', marginTop: 4 }}>ขอ: {Object.keys(req.permissions).filter(k => req.permissions[k]).map(k => k === 'admin' ? 'Admin' : k === 'finance' ? 'การเงิน' : k === 'stock' ? 'สต๊อก' : k === 'live' ? 'ไลฟ์' : k === 'claims' ? 'เครม' : k).join(', ')}</div>
                </div>
                <button onClick={() => approveReq(req)} disabled={busy === req.reqId} style={{ padding: '8px 16px', borderRadius: 6, border: 'none', background: '#10b981', color: '#fff', fontWeight: 600, cursor: 'pointer' }}>✓ อนุมัติ</button>
                <button onClick={() => rejectReq(req)} disabled={busy === req.reqId} style={{ padding: '8px 16px', borderRadius: 6, border: '1px solid #ef4444', background: 'transparent', color: '#ef4444', cursor: 'pointer' }}>✗ ปฏิเสธ</button>
              </div>
            ))}
          </div>
        )}
      </div>
      <div className="card" style={{ padding: 20 }}>
        <h3 style={{ margin: '0 0 14px', color: '#064e3b' }}>🛡 สิทธิ์พนักงาน</h3>
        <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 14 }}>
          <thead>
            <tr style={{ borderBottom: '2px solid var(--border)', textAlign: 'left' }}>
              <th style={{ padding: '8px 6px', color: 'var(--muted)' }}>ชื่อ</th>
              <th style={{ padding: '8px 6px', color: 'var(--muted)', textAlign: 'center' }}>🔧 Admin</th>
              <th style={{ padding: '8px 6px', color: 'var(--muted)', textAlign: 'center' }}>💰 การเงิน</th>
              <th style={{ padding: '8px 6px', color: 'var(--muted)', textAlign: 'center' }}>📦 สต๊อก</th>
              <th style={{ padding: '8px 6px', color: 'var(--muted)', textAlign: 'center' }}>📡 ไลฟ์</th>
              <th style={{ padding: '8px 6px', color: 'var(--muted)', textAlign: 'center' }}>🧾 เครม</th>
            </tr>
          </thead>
          <tbody>
            {employees.filter(e => e.status === 'active').map(e => {
              const isOwner = e.permissions && e.permissions.owner;
              return (
                <tr key={e.id} style={{ borderBottom: '1px solid var(--border)' }}>
                  <td style={{ padding: '8px 6px' }}>
                    <div style={{ fontWeight: 500 }}>{e.name} {isOwner && <span style={{ marginLeft: 6, fontSize: 11, padding: '2px 6px', background: '#fef3c7', color: '#92400e', borderRadius: 6 }}>👑 เจ้าของ</span>}</div>
                    <div style={{ fontSize: 11, color: 'var(--muted)' }}>{e.id} · {e.position || '—'}</div>
                  </td>
                  {['admin', 'finance', 'stock', 'live', 'claims'].map(k => {
                    const effective = overrides[e.id] || e.permissions || {};
                    const saving = !!savingMap[e.id + ':' + k];
                    return (
                      <td key={k} style={{ padding: '8px 6px', textAlign: 'center', position: 'relative' }}>
                        <input type="checkbox" checked={!!(isOwner || effective[k])} disabled={isOwner} onChange={ev => updatePerm(e, k, ev.target.checked)} style={{ width: 18, height: 18, cursor: isOwner ? 'not-allowed' : 'pointer', opacity: saving ? 0.6 : 1 }} />
                        {saving && <span style={{ position: 'absolute', top: 2, right: 2, fontSize: 9, color: '#0ea5e9' }}>⟳</span>}
                      </td>
                    );
                  })}
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

            <>
              <button onClick={() => setView('register')} style={{ padding: '8px 14px', borderRadius: 8, border: 'none', background: '#10b981', color: '#fff', cursor: 'pointer', fontSize: 13, fontWeight: 600 }}>+ ลงทะเบียนพนักงาน</button>
              <button onClick={() => setView('list')} style={{ padding: '8px 14px', borderRadius: 8, border: '1px solid #0ea5e9', background: '#fff', color: '#0ea5e9', cursor: 'pointer', fontSize: 13 }}>รายชื่อ ({employees.length})</button>
              <button onClick={() => setView('logs')} style={{ padding: '8px 14px', borderRadius: 8, border: '1px solid #0ea5e9', background: '#fff', color: '#0ea5e9', cursor: 'pointer', fontSize: 13 }}>📊 บันทึก</button>
              <button onClick={() => setView('locations')} style={{ padding: '8px 14px', borderRadius: 8, border: '1px solid #8b5cf6', background: '#fff', color: '#8b5cf6', cursor: 'pointer', fontSize: 13 }}>🗺 สถานที่ ({locations.length})</button>
              <button onClick={() => setView('permissions')} style={{ padding: '8px 14px', borderRadius: 8, border: '1px solid #f59e0b', background: '#fff', color: '#f59e0b', cursor: 'pointer', fontSize: 13 }}>🛡 จัดการสิทธิ์</button>
            </>
          )}
        </div>
      </div>

      {error && <div className="card" style={{ padding: 16, background: '#fee2e2', color: '#991b1b', marginBottom: 14 }}>⚠️ {error}</div>}

      {view === 'home' && <ClockPanel employees={employees} locations={locations} modelsReady={modelsReady} deviceName={deviceName} onLogged={loadEmployees} />}
      {view === 'register' && <RegisterPanel modelsReady={modelsReady} onDone={() => { setView('home'); loadEmployees(); }} onCancel={() => setView('home')} />}
      {view === 'list' && <EmployeeList employees={employees} onChanged={loadEmployees} onClose={() => setView('home')} />}
      {view === 'logs' && <AttendanceLogs employees={employees} onClose={() => setView('home')} />}
      {view === 'locations' && <LocationManager onClose={() => setView('home')} onChanged={loadLocations} />}
      {view === 'login' && <FaceLoginPanel employees={employees} modelsReady={modelsReady} onLoggedIn={() => setView('home')} onCancel={() => setView('home')} />}
      {view === 'request' && currentUser && <RequestPermissionPanel currentUser={currentUser} onClose={() => setView('home')} />}
      {view === 'permissions' && <PermissionsManager employees={employees} onChanged={loadEmployees} onClose={() => setView('home')} />}
    </div>
  );
}

// ─── Login modal (เข้าระบบด้วยใบหน้า — เรียกจากปุ่มซ้ายล่าง) ───
function LoginModal({ open, onClose }) {
  const [employees, setEmployees] = React.useState([]);
  const [modelsReady, setModelsReady] = React.useState(false);
  const [status, setStatus] = React.useState('');
  const [mode, setMode] = React.useState('face');
  React.useEffect(function () {
    if (!open) return;
    setStatus('กำลังโหลดระบบ...');
    loadFaceApi().then(function () { setModelsReady(true); }).catch(function (e) { setStatus('โหลดระบบใบหน้าไม่สำเร็จ: ' + e.message); });
    apiGet('list_employees').then(function (r) { setEmployees(r.employees || []); setStatus(''); }).catch(function (e) { setStatus('โหลดรายชื่อไม่สำเร็จ: ' + e.message); });
  }, [open]);
  if (!open) return null;
  return (
    <div onClick={onClose} style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.55)', zIndex: 9999, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 16 }}>
      <div onClick={function (e) { e.stopPropagation(); }} style={{ background: 'var(--surface, #fff)', borderRadius: 16, padding: 20, maxWidth: 920, width: '100%', maxHeight: '92vh', overflow: 'auto', boxShadow: '0 20px 60px rgba(0,0,0,0.3)' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
          <h2 style={{ margin: 0, fontSize: 18, color: 'var(--ink)' }}>🔓 เข้าสู่ระบบ</h2>
          <button onClick={onClose} style={{ border: 'none', background: 'transparent', fontSize: 22, cursor: 'pointer', color: 'var(--muted)' }}>✕</button>
        </div>
        <div style={{ display: 'flex', gap: 8, marginBottom: 14, background: 'var(--bg-2)', padding: 4, borderRadius: 12 }}>
          <button onClick={() => setMode('face')} style={{ flex: 1, padding: '10px', borderRadius: 9, border: 'none', cursor: 'pointer', fontSize: 14, fontWeight: 700, background: mode === 'face' ? 'var(--surface)' : 'transparent', color: mode === 'face' ? 'var(--ink)' : 'var(--muted)', boxShadow: mode === 'face' ? '0 2px 8px rgba(0,0,0,0.08)' : 'none' }}>👁 สแกนหน้า</button>
          <button onClick={() => setMode('pin')} style={{ flex: 1, padding: '10px', borderRadius: 9, border: 'none', cursor: 'pointer', fontSize: 14, fontWeight: 700, background: mode === 'pin' ? 'var(--surface)' : 'transparent', color: mode === 'pin' ? 'var(--ink)' : 'var(--muted)', boxShadow: mode === 'pin' ? '0 2px 8px rgba(0,0,0,0.08)' : 'none' }}>🔢 ใช้ PIN</button>
        </div>
        {status && <div style={{ color: 'var(--muted)', fontSize: 13, marginBottom: 10 }}>{status}</div>}
        {mode === 'face'
          ? <FaceLoginPanel employees={employees} modelsReady={modelsReady} onLoggedIn={onClose} onCancel={onClose} />
          : <PinLoginPanel employees={employees} onLoggedIn={onClose} onCancel={onClose} />}
      </div>
    </div>
  );
}

// ─── App root ─────────────────────────────────────────
function App() {
  React.useEffect(() => {
    if (window.MKW_VIEW_ONLY) document.body.classList.add('mkw-view-only');
    // โหลดโมเดลใบหน้าล่วงหน้า (background) เพื่อให้สแกนครั้งแรกเร็วขึ้น
    const pre = setTimeout(() => { try { loadFaceApi().catch(() => {}); } catch (e) {} }, 1500);
    return () => clearTimeout(pre);
  }, []);
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [period, setPeriod] = React.useState('year');
  const [activeNav, setActiveNav] = React.useState('finance');
  const currentUser = useCurrentUser();
  const [loginOpen, setLoginOpen] = React.useState(false);
  const [pinSetupOpen, setPinSetupOpen] = React.useState(false);
  const canFinance = hasPerm(currentUser, 'finance');
  const canStock = hasPerm(currentUser, 'stock');
  const canLive = hasPerm(currentUser, 'live');
  const canClaims = hasPerm(currentUser, 'claims');
  const [activeKPI, setActiveKPI] = React.useState('revenue');
  const [range, setRange] = React.useState(() => {
    const today = new Date(2026, 4, 9); // 9 พ.ค. 2569
    const start = new Date(2026, 4, 9);
    start.setDate(today.getDate() - 29);
    return { start, end: today, preset: '30d' };
  });
  const [refreshing, setRefreshing] = React.useState(false);
  const [lastSync, setLastSync] = React.useState(() => new Date(2026, 4, 9, 9, 14));

  // ─── Multi-month state ─────────────────────────────────────
  const [months, setMonths] = React.useState(() => window.MKW_STORE.loadMonths());
  const [activeId, setActiveId] = React.useState(() => {
    const saved = window.MKW_STORE.loadActiveId();
    const ms = window.MKW_STORE.loadMonths();
    return ms.find((m) => m.id === saved) ? saved : ms[0].id;
  });
  const [mgrOpen, setMgrOpen] = React.useState(false);
  const [mgrMode, setMgrMode] = React.useState('add');
  const [mgrEditId, setMgrEditId] = React.useState(null);

  React.useEffect(() => { window.MKW_STORE.saveMonths(months); }, [months]);
  React.useEffect(() => { window.MKW_STORE.saveActiveId(activeId); }, [activeId]);

  // Load finance data from Google Sheet on mount (if MKW_USE_SHEET is enabled)
  React.useEffect(() => {
    if (window.MKW_USE_SHEET === false) return;
    fetchFinanceFromSheet().then((sheetMonths) => {
      if (sheetMonths && sheetMonths.length) {
        setMonths(sheetMonths);
      }
    });
  }, []);

  const activeMonth = months.find((m) => m.id === activeId) || months[0];
  // Find prev month for delta
  const sortedIds = [...months].map((m) => m.id).sort();
  const prevId = sortedIds[sortedIds.indexOf(activeId) - 1];
  const prevMonth = months.find((m) => m.id === prevId);

  const onRefresh = () => {
    if (refreshing) return;
    setRefreshing(true);
    // Re-fetch finance data from sheet if enabled
    if (window.MKW_USE_SHEET !== false) {
      fetchFinanceFromSheet().then((sheetMonths) => {
        if (sheetMonths && sheetMonths.length) setMonths(sheetMonths);
        setRefreshing(false); setLastSync(new Date());
      });
      return;
    }
    setTimeout(() => { setRefreshing(false); setLastSync(new Date()); }, 1100);
  };

  const onSaveMonth = (rec) => {
    setMonths((ms) => {
      const idx = ms.findIndex((m) => m.id === rec.id);
      if (idx >= 0) { const next = [...ms]; next[idx] = rec; return next; }
      return [...ms, rec];
    });
    setActiveId(rec.id);
    setMgrOpen(false);
    setLastSync(new Date());
  };
  const onDeleteMonth = (id) => {
    setMonths((ms) => {
      const next = ms.filter((m) => m.id !== id);
      if (next.length === 0) return [window.MKW_STORE.DEFAULT_JAN_2569];
      return next;
    });
    if (activeId === id) {
      const remaining = months.filter((m) => m.id !== id);
      if (remaining.length) setActiveId(remaining[0].id);
    }
    setMgrOpen(false);
  };
  const onExportAll = () => {
    const blob = new Blob([JSON.stringify({ version: 1, months }, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `mkw-dashboard-${new Date().toISOString().slice(0, 10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };
  const onExportPublic = async () => {
    try {
      const html = await (await fetch(window.location.pathname || 'Dashboard.html')).text();
      const json = JSON.stringify(months);
      const openTag = '<' + 'script>';
      const closeTag = '<' + '/script>';
      const dataScript = openTag + 'window.MKW_BAKED_DATA = ' + json + '; window.MKW_VIEW_ONLY = true;' + closeTag;
      const headTag = '<' + '/head>';
      const out = html.replace(headTag, dataScript + '\n' + headTag);
      const blob = new Blob([out], { type: 'text/html;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'Dashboard-public-' + new Date().toISOString().slice(0, 10) + '.html';
      a.click();
      URL.revokeObjectURL(url);
    } catch (e) {
      alert('สร้างไฟล์ล้มเหลว: ' + e.message);
    }
  };
  const onImportAll = async (file) => {
    try {
      const txt = await file.text();
      const data = JSON.parse(txt);
      const arr = Array.isArray(data) ? data : data.months;
      if (!Array.isArray(arr)) throw new Error('รูปแบบไฟล์ไม่ถูกต้อง');
      // Merge: imported overrides existing by id
      setMonths((ms) => {
        const map = new Map(ms.map((m) => [m.id, m]));
        for (const m of arr) map.set(m.id, m);
        return Array.from(map.values());
      });
      alert(`นำเข้า ${arr.length} เดือนสำเร็จ`);
    } catch (e) {
      alert('นำเข้าล้มเหลว: ' + e.message);
    }
  };

  // Apply theme to root
  React.useEffect(() => {
    const root = document.documentElement;
    root.dataset.theme = t.dark ? 'dark' : 'light';
    root.dataset.accent = t.accent;
    root.dataset.density = t.density;
  }, [t.dark, t.accent, t.density]);

  const series = React.useMemo(() => genSeries(period, activeMonth, prevMonth, months), [period, activeMonth, prevMonth, months]);
  const totals = series.totals;
  const prev = series.prev;

  const effectiveMonth = React.useMemo(() => {
    if (period === 'year') {
      const yr = activeMonth.id.split('-')[0];
      return window.MKW_STORE.aggregateYear(months, yr);
    }
    return activeMonth;
  }, [period, activeMonth, months]);
  const channels = React.useMemo(() => channelsFromMonth(effectiveMonth), [effectiveMonth]);
  const opexItems = React.useMemo(() => opexFromMonth(effectiveMonth), [effectiveMonth]);
  const txns = React.useMemo(() => txnsFromMonth(activeMonth), [activeMonth]);

  // Sparkline data for KPIs (use trailing 12 points of various series)
  const sparkData = {
    revenue: series.points.map((p) => p.revenue),
    profit: series.points.map((p) => p.profit),
    cogs: series.points.map((p) => p.cogs),
    opex: series.points.map((p) => p.opex),
  };

  const inflow = totals.revenue;
  const outflow = totals.cogs + totals.opex;

  return (
    <div className="app">
      <Sidebar active={activeNav} onSelect={setActiveNav} currentUser={currentUser} onLoginClick={() => setLoginOpen(true)} onLogout={() => logoutCurrentUser()} onSetPin={() => setPinSetupOpen(true)} />
      <main className="main">
        {activeNav === 'finance' && !canFinance && (<LockedView perm="finance" permLabel="หน้าการเงิน" onGoToPeople={() => setActiveNav('people')} onLogin={() => setLoginOpen(true)} />)}
        {activeNav === 'finance' && canFinance && (
        <>
        {/* Top bar */}
        <div className="topbar">
          <div className="page-title">
            <div className="crumb">
              การเงิน · ภาพรวม · <span style={{ color: refreshing ? 'var(--leaf)' : 'var(--muted)' }}>
                {refreshing ? '● กำลังซิงก์ข้อมูล…' : `● อัปเดตล่าสุด ${fmtSyncTime(lastSync)}`}
              </span>
            </div>
            <h1>ภาพรวมการเงิน <span style={{ color: 'var(--muted)', fontWeight: 400 }}>· {series.meta.seriesLabel}</span></h1>
          </div>
          <div className="topbar-tools">
            {period === 'year' ? (
              <YearPicker
                months={months}
                activeId={activeId}
                onSelect={setActiveId}
                onOpenManager={(mode) => { setMgrMode(mode); setMgrEditId(null); setMgrOpen(true); }}
              />
            ) : (
              <window.MKW_MANAGER.MonthSwitcher
                months={months}
                activeId={activeId}
                onSelect={setActiveId}
                onOpenManager={(mode) => { setMgrMode(mode); setMgrEditId(null); setMgrOpen(true); }}
              />
            )}
            <PeriodSeg value={period} onChange={setPeriod} />
            <DateRangePicker range={range} onChange={setRange} period={period} />
            <button className={`btn btn-refresh ${refreshing ? 'spinning' : ''}`} onClick={onRefresh} title="รีเฟรชข้อมูล" disabled={refreshing}>
              <Icon.refresh />
              <span style={{display: 'inline'}}>{refreshing ? 'กำลังอัปเดต…' : 'รีเฟรช'}</span>
            </button>
            <button className="btn" title="ดาวน์โหลดรายงาน" onClick={onExportAll}><Icon.download /><span style={{display: 'inline'}}>Export</span></button>
          </div>
        </div>

        {/* KPI cards */}
        <div className="kpi-grid">
          <KPI label="รายได้รวม" value={totals.revenue} prev={prev.revenue}
               dotColor="var(--tamarind)" sparkColor="var(--tamarind)" sparkData={sparkData.revenue}
               active={activeKPI === 'revenue'} onClick={() => setActiveKPI('revenue')} />
          <KPI label="กำไรสุทธิ" value={totals.profit} prev={prev.profit}
               dotColor="var(--leaf)" sparkColor="var(--leaf)" sparkData={sparkData.profit}
               active={activeKPI === 'profit'} onClick={() => setActiveKPI('profit')} colorBySign />
          <KPI label="ต้นทุนสินค้าขาย (COGS)" value={totals.cogs} prev={prev.cogs}
               dotColor="var(--rust)" sparkColor="var(--rust)" sparkData={sparkData.cogs}
               active={activeKPI === 'cogs'} onClick={() => setActiveKPI('cogs')} />
          <KPI label="ค่าใช้จ่ายดำเนินงาน" value={totals.opex} prev={prev.opex}
               dotColor="var(--honey)" sparkColor="var(--honey)" sparkData={sparkData.opex}
               active={activeKPI === 'opex'} onClick={() => setActiveKPI('opex')} />
        </div>

        {/* Cashflow strip */}
        <CashStrip inflow={inflow} outflow={outflow} />

        {/* Revenue + Channel */}
        <div className="row-grid">
          <RevenueCard series={series} period={period} />
          <ChannelCard channels={channels} monthName={effectiveMonth.thaiName} />
        </div>

        {/* Expense + Transactions */}
        <div className="row-grid-3">
          <ExpenseCard items={opexItems} monthName={effectiveMonth.thaiName} />
          <Transactions txns={txns} />
        </div>

        {/* Footer */}
        <div style={{ marginTop: 24, paddingTop: 14, borderTop: '1px solid var(--border)', display: 'flex', justifyContent: 'space-between', flexWrap: 'wrap', gap: 8, color: 'var(--faint)', fontSize: 11.5 }}>
          <div>บจก.มะขามหวานพอดี · ข้อมูล {months.length} เดือน · เก็บในเบราว์เซอร์</div>
          <div style={{ display:'flex', gap:12, alignItems:'center', flexWrap:'wrap' }}>
            {!window.MKW_VIEW_ONLY && (<button className="btn" style={{ padding: '5px 10px', fontSize: 11.5 }} onClick={() => { setMgrMode('manage'); setMgrEditId(null); setMgrOpen(true); }}>จัดการข้อมูล / Backup</button>)}
          </div>
        </div>
        </>
        )}
        {activeNav === 'stock' && (canStock ? <StockView /> : <LockedView perm="stock" permLabel="หน้าสต๊อกสินค้า" onGoToPeople={() => setActiveNav('people')} onLogin={() => setLoginOpen(true)} />)}
        {activeNav === 'people' && (<PeopleView />)}
        {activeNav === 'live' && (canLive ? <LiveSalesView currentUser={currentUser} /> : <LockedView perm="live" permLabel="หน้ายอดขาย(ไลฟ์)" onGoToPeople={() => setActiveNav('people')} onLogin={() => setLoginOpen(true)} />)}
        {activeNav === 'claims' && (canClaims ? <ClaimsView /> : <LockedView perm="claims" permLabel="หน้าเครมสินค้า" onGoToPeople={() => setActiveNav('people')} onLogin={() => setLoginOpen(true)} />)}
      </main>

      <window.MKW_MANAGER.DataManagerModal
        open={mgrOpen}
        mode={mgrMode}
        months={months}
        activeId={activeId}
        editId={mgrEditId}
        onClose={() => setMgrOpen(false)}
        onSave={onSaveMonth}
        onDelete={onDeleteMonth}
        onImportAll={onImportAll}
        onExportAll={onExportAll}
        onExportPublic={onExportPublic}
      />

      {!currentUser && <button className="mob-login-fab" onClick={() => setLoginOpen(true)} title="เข้าระบบด้วยใบหน้า"><span className="fab-ic">🔓</span><span className="fab-tx">เข้าระบบ</span></button>}
      {currentUser && <button className="mob-pin-fab" onClick={() => setPinSetupOpen(true)} title="ตั้ง/เปลี่ยน PIN">🔑</button>}
      {currentUser && <button className="mob-logout-fab" onClick={() => logoutCurrentUser()} title="ออกจากระบบ">🚪</button>}
      <MobileNav active={activeNav} onSelect={setActiveNav} />
      <LoginModal open={loginOpen} onClose={() => setLoginOpen(false)} />
      <PinSetupModal open={pinSetupOpen} currentUser={currentUser} onClose={() => setPinSetupOpen(false)} />

      <TweaksPanel title="Tweaks">
        <TweakSection label="Theme">
          <TweakColor label="Accent" value={t.accent}
            options={[
              ['#92400e', '#d97706', '#65a30d'],
              ['#b45309', '#d97706', '#65a30d'],
              ['#166534', '#15803d', '#84cc16'],
              ['#1e293b', '#475569', '#0ea5e9'],
            ]}
            onChange={(v) => {
              // Map array back to a key. We compare first hex.
              const key = { '#92400e': 'earth', '#b45309': 'amber', '#166534': 'forest', '#1e293b': 'slate' }[v[0]] || 'earth';
              setTweak('accent', key);
            }} />
          <TweakToggle label="Dark mode" value={t.dark} onChange={(v) => setTweak('dark', v)} />
        </TweakSection>
        <TweakSection label="Layout">
          <TweakRadio label="Density" value={t.density}
            options={['compact', 'regular', 'comfy']}
            onChange={(v) => setTweak('density', v)} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

</script>
</body>
</html>
